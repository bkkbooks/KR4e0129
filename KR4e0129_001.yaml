body:
  text: 醫閭集卷一明賀士咨編言行録先生平生奉親極孝母黨姻戚雖甚寒賤待之盡其愛敬極其賙恤親有疾則極其憂瘁湯藥必自嘗迎醫必拜之先生於朔望祠堂行禮後必詣别宅拜從叔母率以為常先生性喜於訪問與鄉之長老言輒問先輩德政之善與他處人言輒問地理風俗人物之實以至各邉蠻夷之情狀無不訪求先生謁疾家居四十年弔喪問疾外不輕出一切貴官相訪者止是致敬以延待之未嘗往拜也間有不樂者先生聞之曰某何敢慢人養病官法當如此耳鄉之親故兄弟䦧牆夫婦反目執迷不返人不能措一辭者先生杯酒從容之際一言復初矣蓋誠意動人不覺心服耳先生善化導人雖耆老商賈往往從化有史六丈者平生商於南方老而始歸慕先生之德遂來求學先生仍以前輩待之每來輒為解說小學家禮次四書次朱子通鑑綱目次及春秋經左氏諸家傳數年之間寒暑不置史遂有所得巍然為鄉之達尊凡鄉人從先生之言行文公喪葬正禮者史丈為之護喪排異端守禮法老而益篤或言行有違禮者先生必正色語之史亦安受不以為忤也又史璠者丈人從子也亦為商遣其子從先生逰亦自取小學講說體行鄉中夸毗子往往笑之史君曰我惟從賀先生行耳久之行義卓然鄉人敬服遭母喪一遵文公禮衰服儼然居倚廬之中不御葷酒終喪始出後數年先生為作倚廬記紀其實以為世勸云先生嘗迎從叔父之喪于他州適其邉有以酒食誘殺人而以報功者其指揮董某者謂其當事之官曰吾聞賀父將至倘問及殺賊事以實告耶姑諱之也其人曰是安可實告只言敵殺耳已而先生至董具道其實且曰某於他人可欺於尊者不忍欺也先生得人盡情大率類此先生往年寓客邸時視從者燒煤主家之婦見其未習也自為燒之先生輒致敬以避於外如是者再三則其人亦知禮而相避矣蓋化之也先生靜修林下而實未有忘天下之心當孝宗改元之時遼東都司都指揮鄧鈺大學士劉吉御史姜洪曹琳更有不記名者若干人交章薦舉時先生有老母在堂聞之曰時其泰乎吾雖不能出而天下賢才當見用矣先生之外父乏嗣取而養之於家己而慮曰古人必立同宗之子為後今吾外父有姪當為立之議其季者其母有艱色乃議其兄之瞽者且曰瞽於其家無用而有孩數嵗遂取為後且謂世之瞽者誦習淫邪妄誕而不知道正事乃獨教以誦文公小學教條東萊格言孝順詩有益事云族弟禟家人嘗與鄉之劉姓公子爭貿易以瓦礫擲其馬不數日馬病死欲訟之官先生有家生良馬直若干金劉指語人曰必得此馬吾方已也先生知之即以與之不須禟一錢先生自少即勤問學不事逰樂及成化戊子謁疾歸家益濳心正學杜門不出者十年至戊戌嵗始造表弟馬指揮文敬園中看花有詩云齊居四十二年身未見東風桃李春今日名園一杯酒不妨聊作賞花人蓋實事也先生數嵗時嘗宿親戚家其老者能言典故先生與之寢不一二夜得其所有殆盡聞者咸異之已而為衛庠生憲副楊公鏞按臨見而愛之問吾州古郡名對之甚悉楊喜目浮圖出句云寶塔七層逺近皆來瞻仰即應曰邦畿千里華夷無不歸依楊益喜且曰他日必成逺器先生雖習舉業時乏典籍偶得性理羣書一冊把玩不倦識見趨向自少年已過人逺矣景泰初吾州以邉衛奮武絶少文學衛庠雖設而為生員者多官府拘執充之故當時校各所出丁重役則曰吾所有讀官學者若干人矣是以讀書為重役也先生乃挺然崛起勤於學業年十八聞遼陽新舉子邱時雍先生精於詩遂不逺數百里往從學焉逾年有得而歸年二十中鄉試第二乃吾州破荒也鄉人稱先生自少謹飭正大雖處他鄉無父師相臨而未嘗為一䙝狎非禮之事諸友之年長者亦罔不愛重焉先生在科時凡外官有饋於科中則其鄉里同年之在科者為之致之書籍帽襪之類盛以食羅舁入分布一切却之同官對送者大言曰此獨不受者新選戶科賀大人耳先生略不恤也有鄉里相尋不遇以乾葡萄一囊投之而去先生歸曰此不可受者遂訪其人於正陽門外還之比歸為暑所傷痱出遍體後嵗至其時則發夫人嘗指以示兒輩曰汝父此瘡如此得耳表親千戶馬某以貧乏割其居宅一隅賣之先生知之諭之曰汝祖宗故宅奈何輕以毁棄耶乃為出白金數兩以贖之又表親某假貸白金數兩於鄉人須索甚急卒無以應因搆讎怨先生曰當有以解之時方空乏乃假之相知者得白金如其數償之先生嘗言人不可作半間不界之人故每語人必以盡善全美之道凡鄉人有爭田者必以虞芮讓田告之兄弟相爭者必以夷齊讓國告之有為繼母所苦及弟之不道者必以大舜之事告之傍引曲譬反覆不厭故雖頑者亦多感悟焉先生懲人之罪雖嚴肅然事過即不復停蓄於心矣看杜詩曰無深意味不如還看擊壤集也先生性喜賔客恭謹樂易好咨訪老而不懈用是屏居四十餘年而於天下人物風土民情邊患類能知之先生所友皆當時第一流人如陳白沙羅一峯林蒙菴周翠渠輩凡有言論書尺切於進德修業者必籍録置座前時用觀省正德已己逆瑾括民田東人驚疑思亂義州以守臣貪懦遂先發聚衆縱火劫財城中大擾然相戒曰毋入東街驚賀老爺鄉人以告遂請先生往諭先生辭曰吾非上官獲保里閈足矣請之再三遂從弟子十餘人往彼即拜跪言此事恐不能保全乞示生路先生曰汝輩既知悔即不殺人猶可解衆稍戢俄而相率至東街巷口羅跪再請先生曰爾等燒屋劫財皆可抵償惟殺人不可赦明後日鎮城當有體勘人來爾輩須拜跪求生耳慎無殺人已而撫鎮人果至須臾又報發軍來剿衆復呼噪相聚曰賀老爺不曾說謊我輩再往問之先生曰城中被爾等擾亂至此鎮城焉得不發兵兵雖至爾等苐不殺人當有原宥衆復退數日竟如其言城中不傷一人屯中鑿窖得錢若干先生分濟貧乏且為銀的以誘射焉郡人某其子已為儒學生以貧鬻為義孫先生傷感垂涕令家人借銀若干資之不計其報先生教子孫嚴而有道教門生亦然子孫男女但解言語即教以揖拜問安之禮知出入即教以出告反面之禮雖習舉業必教以得失有命毋為奪志讀書暇日則教以學算數講六書習射法郊行見枯骨輒令子弟埋之鄉閭育女多不舉先生立法以戒家人曰吾家子婦敢有效尤者必出之蓋忍於殺子何所不至乎先生晨興祠堂行禮後入書舍諸生揖畢則令背誦白鹿洞規東萊格言曰此諸經之機括在吾人實體而行之真學聖賢之要訣也丁寧反覆不厭其詳雖僮僕孩稚咸習聞其說焉先生有一友嘗為縣罷歸簡傲不拘小節鄉人易之而先生敬待如初或以為請先生曰此公有氣節曾於國子監奏巨璫罪惡後其人送香文廟諸生揖畢即舉名問曰某人安在此公立應曰學生是也忠直之名傳天下夫取人者當於其大節小節置之可也先生以文公制為祠堂奉先始以繼禰小宗不敢祭及四代既而得原籍定海家書知繼髙祖之小宗貧弱無室廬乃嘆曰謀生如此祀禮可知於是制髙祖以下神主祀之為辭以告從權之故又初從家禮以西為上後謂文公拘於時制祖開元之禮於人情未安乃更以中為尊焉凡教童子即以格言至論日夕薰聒之曰此所謂作聖之基也如周元公希賢希聖章悉以俚語易其辭揭諸壁使童蒙熟誦先生自少未嘗以居官受用許家人而必語以力田謀食之道曰古人仕宦為行道濟世耳可以此求衣食乎軍士亡命其妻以徵糧自縊救不死苦楚莫訴先生聞知令人召婦立劵為代輸或曰徒收此劵耳不如無也先生曰非汝所知也門生某奉簡求薦先生復書諭以安命守義之意且歎曰渠聼信與否不可必盡吾心焉耳憲廟喪先生於書舍率子弟門生齊宿有别館生三人以市無肉買豕殺而食之先生怒而責之先生嘗曰詩不叶韻不成詩況性情有邪正好惡之心得之吟咏今學詩者不叶韻遺淫詩豈聖人刪詩教人本意讀春秋一主程胡於書取典謨訓誥諸明顯者時時誦味禮中有疑者曰在吾人精以擇之乂曰文公採輯於小學者精粹之言也可詳玩而力行之先生尤喜易觀象玩辭不以髙年衰病少置至於易學啓蒙沉濳反復功力尤多李參戎守義錦三衛長蘇庫台者以燕狗子為謀主嵗為邉患狗子故開原盜亡入邊因為鄉導先生語李曰擒狗子庶邉患可少李猶豫未決先生曰文公白鹿洞規不有處事之要乎正其誼不謀其利明其道不計其功是已斷而行之乃不為徒誦說也李意決成化壬寅夏訃擒狗子誅之是後纍嵗無邉警門生有胡文寶者當科舉時以疾不果行返該衛路費先生深喜每舉以勉諸生曰人須取舍明然後可以上進倘義利不明先已陷于小人之域何緣上進耶謂門人王瑞之驕矜之病人皆有之瑞之更多耳當省察克治之方可進也乃為詩舉謝子事書其扇以教之自後瑞之知所用力常自克勵後尹臨安六載有聲成化庚子東土大饑先生告之李正郎曰聞永平倉有米若預奏朝廷運來賑濟庶人民不至死亡而邉方可守李諾之得米八萬石明年果再饑賴此克濟門生於衢路中或失儀責之曰為學須躬行躬行須謹隱微小小禮儀遵守不得更說甚躬行於顯明之處尚如此則隱微可知矣乂曰好利之徒何益於師門何益於鄉黨何益於國家教門生曰為學須躬行故曰學者將以行之也不行豈謂之學又曰躬行須是改過遷善不然妄行而已謂門生曰汝各家紡織否對曰不能也且無閒工夫曰此何言也男耕女織此正當為之事今有不㑹種田者乎不為耳若曰無閒工夫吾鄉未嘗以無閒工夫不種田也汝輩讀書只是不信如葛覃七月等詩只是口誦而已此是吾鄉所缺者却將糧食易衣少間衣食俱不足矣著意為之不愈於外面奔波耶某巡按考試丁憂生員先生曰此何理也壞人倫壞風俗孰甚於此古人凡有喪者天子之命三年不過其門教之孝也又曰好秀才決不出考忍心害理君子肯為之耶皆可嘆也門生有粗率者侍立恭謹先生曰朝夕侍親守得此禮便是孝敬之子矣門生侍側先生問之曰孟子曰聖人與我同類者汝輩亦曾如此省察思慮否孟子此章喫力說許多話其意安在汝輩讀之曾得其意否讀書不切已誦說何益因門生說孟子天爵良貴章教之曰此處說內外輕重極是明白痛切但汝輩心中不十分愛他不把來心中常常涵泳體察何由得長進耶李參戎談毛正郎為屯軍貧者娶妻事先生曰文王發政施仁必先於鰥寡孤獨毛公亦有合此意其心雖私而事則公也李曰斂官員之俸以為之焉得為善曰所妨者小所成者大如彼取之如此用之人亦安得而非之今但繼其事而以誠心行之又推而及於操軍邉軍之無妻者悉為娶之不亦大好事耶又安可以其心之私遂非之而不為也為己為人天理人欲所爭毫末耳門生有居喪而外父死議往弔之或曰禮三年之喪不弔先生曰此非尋常弔者比乃重喪未除而遭輕喪服其服而往哭之禮也嘗戒學者曰好戲謔者薄德者也恭敬敦厚謂之德戲謔輕浮非薄德而何盤糧陳繡衣寬來訪請曰生行事可否不能自知且無可問處幸有以教我先生曰不聞此言久矣虛心下問人之所難舜之大智亦不過好問好察大人此意正某之所當法也陳固問之先生以往年之過刻者告之教諸生書過善於籍以為勸戒曰有過非特自以為戒衆人亦當以為戒而自省有善非特衆人以為法而自已亦當以為法而繼之庶乎德業可進也又曰善惡雖小須辨别如睹黑白方好若含糊不分有善亦不知其為善而加勉有惡亦不覺其為惡而克治德業何由而進汝輩須互相講究辨别之可也嘗責一門生曰汝於朋友不取勝已者是廢朋友之倫矣夫君臣父子夫婦長幼皆賴友以規針切磨朋友之倫其可廢乎獄吏有徐姓者公平謹慎曉解文移在司若干年不妄取於人先生聞之喜曰是可教而為善也令人送以厯日徐自兹愈益謹飭門人某為總戎先生以書戒之曰位髙者易驕驕則賢人日踈而忠言不聞忠君報國事業由是而隳矣子其慎之初邑中僧道盛行後以先生正教之興漸次衰謝鄉人惑之者甚少雖緇流亦往往自悔悟有反正者有歸儒而逰門牆者有恨其衰暮而不能歸正者凡人家義男物故即以其妻為他義男之妻者殊非道禮今後吾家或遇此事待其守服滿日欲嫁者嫁之嚴內外之分男女有别人之大禮載諸小學最為詳明人家往往牽於習俗視為末務致帷薄不修悔之已晚今後吾家當一遵正禮戒此俗弊務要男女有别以全人道祠堂所在之宅宗子世守之不得分析所以然者非故為厚此薄彼也將以尊祖考妥神靈重根本而繁枝葉也茍違此義如世俗所為一言忿怒骨肉乖離割户分門斷裂破碎朝為大家而夕若有罪抄劄者使祖宗神靈無頓身之處根本既傷枝葉凋落必然之理矣縱其間有能卓立起家者西榮東瘁豈祖宗兼愛子孫之心哉為吾子孫者當世守此禮庶根本既盛而枝葉自繁違者以不孝論教諸婦一十二條曰安詳恭謹曰承祭祀以嚴曰奉舅姑以孝曰事丈夫以禮曰待娣姒以和曰教子女以正曰撫僕婢以恩曰接親戚以敬曰聽善言以喜曰戒邪妄以誠曰務紡織以勤曰用財物以儉皆用俗語詳悉解之每旬諸婦於堂下拜後令子弟一人於傍讀前教數條聽畢拜謝而退先生嘗曰論文王之化者必序后妃之葛覃數獨夫之惡者必以作竒巧恱婦人為言戒俗而法古敦本而抑末固君子之責也古人云縱不能行之天下猶可驗之一鄉今縱不能行之一鄉不可驗之一家乎同年張汝弼嘗曰吾夢中得二恨語恨司馬遷早死史記之書不完恨蘇東坡早生伊洛之道不信先生曰此何足恨也縱使司馬遷遲死史記得完先黃老而後六經退處士而進姦雄貴勢利而羞賤貧等病能免之乎古人貴親炙蘇子親見二程尚不信其道德若使生於其後何能信之乎縱使隨衆而信之亦虛文耳此二者皆不足恨也先生教門生行祭先之禮每四時仲月課其背誦文公時祭禮文且演其儀度其祭之日期預報而書之至期注銷之有始行不習熟者禮生相之有一親家欲行家禮乃自疑曰我家無秀才奈何先生曰汝家無秀才無人倫乎若用佛教則汝家有和尚乎其人遂服史六文送一生來學且教之曰學些人事也好先生曰此言便不是矣人之所學唯在人事此聖賢教人之正意却說學些也好不知學個什麼是全好耶先生有甥曰胡深者其父沒時甫八月耳年六嵗即從學受躬行之教弱冠時追痛其父早逝未能行喪禮乃謀欲追補之為文一篇以呈先生覽之曰雖汝孝心然先王制禮已有定法不可過也茍有此心竭力以奉寡母盡誠以承祭祀可也俗傳打旱孤樁者謂天旱是墓中新死人作怪所致掘墓碎之則雨愚民無知往往妄作成化間先生嘗告之當道禁其事後數年王備禦始至適天旱村民來告欲踵故俗王草率許之先生聞之急作一簡論其妄誕且干國典王遂悔而急止之已而天自雨訛言亦息後有南人彭姓者專以是惑衆兩城鄉民信者頗多先生言之王參戎杖其人火其書鄉武辨喜功名者往往有燒磚包砌邉牆之議白都閫請諸先生先生曰嘻是欲為秦皇之長城者矣審如是邉人死亡無日矣我國初立邉始而埋木為柵已而掘坎為壕又其後也為小小土牆邉人不甚勞也今規模髙厚民已告勞矣茍欲燒磚包砌非秦之長城而何古人云作者不居居者不作如秦作長城後人因而為利而秦則亡滅此事理之明白者奈何效之縱使處之有法不勞而成只欲地方繼續修理亦已難矣且如吾州之城九里餘耳頃因連雨傾塌殆盡以一城兩衛之力纍年不完今一城之邉動輒二百餘里倘有如吾城傾壞時何以修復今姑以黑白窑言之一城凡有三座每年追其夫丁尚有至秋未完者今為長城計其窑當數倍於前矣民力可能辦耶幸勿再議白公悚然而止往年東人屢欲展遼東省奪三岔河之北老虎林謂其地沃饒且自廣寧至開原甚近雖賢明重臣亦往往惑之先生聞之嘆曰今日視祖宗時强弱如何民不聊生倉廩空乏守其見在者可矣奈何為此好大喜功之事以殺吾邉人乎且東人之所不安者患在無政以養之耳非患地之狹也或者勞力而成為利幾何而兵連禍結寧有已時況時詘舉贏尤古人之所深忌者醫閭集卷一
