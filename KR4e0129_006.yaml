body:
  text: 醫閭集卷六明賀士咨編存稿簡韓良弼公子令弟內有賢父兄外有嚴師友如此事業之成不待卜矣但不知舉業之外更看何書更用何功古人為已之學諸令弟亦嘗有志否有一書名曰程氏讀書分年日程者不可不看若能依據用功決成君子儒也遼陽必有此書可訪觀之却以見報簡𫝊叔父大人屢詢自遼來者備聞尊候多福諸賢弟各修職業為欣為慰但彥明弟支鹽未回且聞無利許大門户日用費力為之奈何近千户韓璽來言都司大人欲具奏舉欽此大不可蓋欽病未痊不能起且老母今年八十有六病卧在牀欽孤子無他兄弟備養決不可出門者若奏行而欽辭疾決不成往是則非欽受詐病之罪即舉主得詐奏之罪矣兩不便也敢煩尊前一為謝之使知此意免勞動念不勝甚幸此係吐露肺肝真情實意鄧父母大人聞之必發憐察肯使人捨八九十老親之養而趨仕路耶此書至日幸即一言無使後期以致紛紛誠大惠也彥清弟當令讀小學書講明其義謹遵之步步行去自有大益切無令其只隨流俗全不理治身心而但為口耳之學也未由面晤敢此以白伏乞尊照幸甚與王天申伯兄恭聞奉令先妣遺骸與先考合葬夫婦父子大倫可謂兩全之矣可勝敬仰欽先考之學生也禮宜預祔祭執事憂病所拘弗克如願謹奉雞二隻聊為祭品之助惟不拒是荷與王天申令姪誠繡衣公選入遼右書院用功杜誠亦然誠母老疾嗽喘不寧雙目不見物色思其子不得見日夜憂戚書院生惟嵗暮得歸再不得擅出院門守者弗容故耳杜毖之在官能不思其母耶萬一自今而後不得㑹晤而母氏告終寧不為終天之恨耶竊謂相知之深者當速語毖之使及早辭官歸養老母終其天年服闋再起庶忠孝兩全也毖之與吾天申為忩友而余亦託交毖之父子間知毖之歸養為美事而不以告是吾人先自不盡朋友之道也是明視毖之墮入不孝之域不一引手救之也是謂毖之不能辭官歸養便己私忘母慈也在吾人而可如是乎曽謂毖之之賢聞良友之忠言不恨得聞之晚惕然悔悟解組趨庭終愧反哺之烏乎因㑹錦州友言李廷幹父八十餘病卧弗起余曰朋友當勸廷幹歸終養再仕張解州在座曰子何舍近求逺杜母如是而不勸毖之尚何廷幹之勸余深然之用有此舉惟天申圖之山人書告書中别紙天申平日寬厚遇人有過多所含容不肯苦口相戒相别又幾年不知近來如何孔子說好仁者便說惡不仁者未嘗為一偏之論也今此一事杜為吾人密友杜之過即吾人之過吾可不汲汲救正之乎當是時也正切切偲偲時也若更含洪則自成病矣匪直無益毖之也世人以官職為重遂至忘親殊不知今日之官視孤竹國之爵土孰為大小輕重夷齊棄國如敝屣而惟求仁得仁之為安曽謂毖之之賢不能超出世人而追踪古人耶天申勉圖之山人又言答纂修髙進士十月晦廣寧胡都司遣人送到執事手翰并纂修事目拜領展誦具悉雅懷奬許過情非所敢當所索不肖當日在科奏草無以應命蓋欽在科日淺章奏不多雖有一二削稿久矣近辭遷官之章冒昧有言蓋雖欲致犬馬之誠奈不學無術所言浮泛不堪施行不蒙允納愧懼不暇敢存其草而復以塵執事之電覽耶欽學未聞道進退無補碌碌庸庸何足齒録若重煩大筆收採備數汚浼簡冊是重其不德也惟髙明察納幸甚外録死節軍士未蒙升職事由雖非今當纂録之事然執事他時回朝有所敷陳則此褒奬節義亦或可備一條也示鄉人欽謝病歸來杜門調攝鄉親故舊有以生徒見囑以寒家有子弟四三人供灑掃者辭之不得乃成化丙申在門者七人中四人有梨渦之眷事不可掩不俟遣而歸自慚德薄妄受鄉親故舊之託而壞其子弟嘗語在門者使歸語父兄别投賢師免貽後悔不蒙見允而今年二月乃或屢屢強以子弟委焉驟而造門不及走避又以鄉之尊長臨之不敢固拒以不宜者告之亦不之信今敢備言其情告在門者使自為去就則後之來者有不俟力拒而自止矣廣授學徒非病者所宜不可一也學堂弗便無內外之辨不可二也科舉之業置之十有二載率皆忘之又素不能改課不可三也迂鄙之見竊慕許魯齊學朱文公從灑掃應對循循而進為務實為己之學也已方有志未能勇為嘗語在門率不信從志既不合何名為友不可四也聖賢經訓本以教人體行今但媒利祿殊不於身心省察詩云子曰則請諸先生立心行已處事接物則任其己私率意肆行先生不得與也一或以經訓格之則口然心否面是背非類以迂闊略之在吾門者何嘗不然不可五也自念不才行實未著徒然忉忉不足取信來者必假尊長以臨逼之既不敢方命在門者又不可一旦峻逐而固遣之用是備陳己私無有所隱鄉之尊長與夫及門之士鑒此鄙誠其進止去就必有處焉簡阮鄉親别久念深時詢動定於東人亦有能言所以者少慰逺懷但不識近况如何煌煌靈芝一年三秀子獨何為有志不就此宋人題篔簹壁詩也朱文公見之有感題云鼎鼎百年能幾時靈芝三秀欲何為金丹嵗晚無消息重歎篔簹壁上詩不知足下之志就否今嵗亦晚矣金丹有消息否無乃亦有前人之感歎乎文公金丹托以喻道無消息者蓋謙辭耳非真若足下爐火久關心刀圭空入夢也如何如何同年羅狀元賢人也今已物故今其親戴集稹來解軍三萬衛交割後幸玉成早歸甚荷簡同年大司成林亨大謝病東歸一别二十餘年雖出處殊途慕仰之心未之或怠前嵗敝邑曹生歸辱惠手翰一緘名扇二握把玩心畫揮引清風宛然如面故人領清誨也來書以欽辭疾不起奬許過甚非所敢當此特自知不才少安愚分耳惶愧惶愧閣下以宏才碩德樂育天下英才而猶不自滿足下求聾瞽以砭不逮真天下之師模也周子曰師道立則善人多善人多則朝廷正而天下治矣不於年兄望尚誰望耶小兒士咨未知為學而頗有此志願先生垂惠啓迪之不勝幸甚人參一斤謹以侑緘伏乞笑納不具寄光祿時文泰小兒去年來後再不得書時聞動定於來京之鄉人而已官署餘暇書史當不廢觀更與好僚友講論正學不唯在已有進又可推之以教子孫不使仍蹈俗學之轍亦為益非細也農桑諸書及向所聞風車車水灌田之法與所謂一竿三釣等類可留心訪問備他日歸閒林下之用惟心照簡都閫王公昨日進拜蒙厚欵承喻教家人紡績推之以及城堡居人甚大惠也蓋此方之人素不曉此用是困於無衣若上之人教勸之使一方無一家之不紡績日後人人遂暖衣之願無號寒之苦則大人恩澤之博極於久逺人之感惠不但有五袴之謡也桑棗之植亦有久逺之利不三數年便見成效又云欲作射圃於府中以較射藝亦大好事凡此俱望及時行之邊方之大幸也恐公務繁多或以此為不急則非吾民之福矣用敢瀆告惟髙明留意焉又昨日承枉顧遣人止打旱孤樁事已止得否敢此奉問即此一事聞諌納善之德可知由是推廣之所謂好善優於天下可期矣又何不獲乎上之足患哉然因是而省之可見為人上者物理之不可不明也訴訟之不可盡信也人言之不可不審也處事之不可不慎也髙明之見當於是乎有省矣敢此瀆告簡馬揮使某也喪母貧甚足下必弔之矣有賻喪之禮宜早行之以周其急也聞以區區所奉拙簡粘之書齊之壁此不必然如古聖賢格言至論切於日用益於身心者置之壁間朝夕觀之接乎目警乎心乃為有所益耳今敢先書近思録中語數條以往可以代之若未精其義暇日過我當細為敷陳之也如何如何希回音與鄧都閫傳聞令舅崔公子與某公子爭田久尚未平各非為財秖尚氣耳某聞名未相識不敢奉勸萬乞一言以告令舅平日人人稱道崔公子者以髙識大度有過人器量也今為數畝田不能讓鄉里故舊乃曰田不足道彼無善辭故弗與耳如是處心如是議論在是時固不失為眼前之豪傑不知吾孟夫子所謂豪傑之士雖無文王猶興之豪傑果亦如是否也此所謂興正大學興仁興讓之興非孟子興兵結怨之興如公子今所行其為興也果何似耶公子才識殊絶於人前嘗告教乃郎以古人躬行為己之學深蒙允納然今日吾所猷為以示法子姓者乃在於爭不在於讓萬一乃郎習見其翁如此不知其為尤而效之不亦昧其所從而壞其美質耶其父殺人報仇其子必且行劫古人防微慎始之深意也昔馮歡為孟嘗君市義以財乃其所有而義所無也勸公子舍田取讓亦若是云閣下備以告之允否示下書東萊格言後以勸鄉人古之先賢教人為君子方方出永樂大典性理大全中最為捷要讀書者固可學不讀書者得此捷要真方亦可學為君子無疑也人患不肯信而謹守之耳能篤信而謹守之其成君子甚易不然雖博學登科以躋顯榮止可謂貴人而已其能成君子耶簡揮使馬伯初中所百户所屯軍尹端者死於窑河之滸欽聞之不忍欲為深埋之因思近設養濟院凡孤老之死者必有棺具以葬埋況賢舅伯初大人為一衛之父母當有仁政以處之也欽故不敢自專謹此奉告以俟可否之命若官無措置相驗畢當為買棺葬之張子曰民吾同胞又曰凡天下之疲癃殘疾窮獨鰥寡皆吾兄弟之顛連而無告者也為此故耳與馬生翔論語曰事父母幾諫見志不從又敬不違勞而不怨小學曰父母有過子三諫而不聽則號泣而隨之又曰父母有過下氣怡色柔聲以諌諌若不入起敬起孝說則復諫不說與其得罪於鄉黨州閭寧熟諫父母怒不說而撻之流血不敢疾怨起敬起孝孝經曰士有爭友則身不離於令名父有爭子則身不陷於不義孟子曰有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也於兄且爾況父乎論語又曰一朝之忿忘其身以及其親右數條皆翔平日所讀講者今日正當謹遵恪守以事親使親感汝之孝幡然悔悟舞斑衣以娛祖母舍危就安去禍受福庶不負令尊擇師教子之心鄉人必曰馬大舍尊明師之訓以聖賢道理勸其親改過為孝是因汝之孝成令尊之孝豈不美哉推其原由師友之所致則區區病夫與有光矣而翔也不用師言不以聖賢格言至論為心不幾諫不號泣隨之而諌勞而或怨撻之流血而或怨不起敬起孝不反覆熟諌果使一朝之忿忘身及親陷父於不孝之地則翔之罪大矣由翔先不孝以致父於不孝則區區之為師者不善教以壞人子弟之罪亦安可逃乎惟翔勉於孝愛以為諭親於道之孝子以全令尊晚節之善以遂祖母桑榆之樂以為師門薰炙之光不亦偉哉惟翔勉之余與令尊為舊親舊友平素交好之密人人知之令尊雖曰不喜人言然余言亦未嘗不受納也今此一事勸之未從況翔子又聘士咨女只是舊親友固不避斧鉞以進逆耳之言況又成今日之親乎不知以怨報怨為不義則已矣知其不義而不以告則病夫自不成人矣非甚不仁者不能不告余何忍為此等人哉援筆不覺喋喋令尊欲觀當奉以觀不欲觀可口陳此義若有疑者親來一講之書李漢章遺行於其挽卷成化丁亥李公漢章以户曹主事差守京城門與奉御御史同往時奉御正坐御史主事副左右側坐公更為一列奉御不然固欲如舊且以不知禮詆公公曰汝若太少監可如舊今既奉御一列是禮也奉御忿然曰吾當言於家公曰吾獨不能言之朝耶奉御訴諸中貴之秉權者以囑司徒河間馬公召公至部問公對之故馬公曰汝胡不隨時猶是秀才性氣觸忤致禍不吾與也公曰以户曹主事坐奉御之側阿諂內臣良為户之辱故不敢從倘由是得禍甘心受之敢為堂尊纍耶馬公知不可奪曰任汝為之自是公不在奉御輒下其坐於側公至即命升焉奉御至見公在坐不下馬而去公曰汝自便吾為代勞也終不為少屈比卒事竟不能禍時欽叨官户科辱公不鄙與之交親聞之公如此公非妄語人也嗚呼即小可以知大觀一節可以知全體直節徑氣如公者可多得也耶可多得也耶天不憗遺斯人蚤世為之奈何嗣子癸丑進士夢龍㑹吾兒士咨於京邸求挽詩余不能吟垂泣書此以歸之贈以德范進士誤子從遊嵗月多秪將文字事登科如今返駕成遲暮若更悠悠奈老何余自景泰丙子叨領鄉薦以德時即相從尊以師禮迄今三十餘年如一日也所愧自不知古人躬行為已之學不能以是為教徒孤負以德一生相尊之意與其天賦淳厚之質但得掇取科第而已在時俗固以以德成名歸德於余余之自愧正謂妄竊師號不能造就之如古君子之儒庸妄誤人之罪不可逭也余與以德年俱半百即今返駕已屬遲暮若更不勉來日幾何今兹逺别用賦此詩以道往年相誤之非為來日相勉之圖以德若能深信鄙言不以為迂力去故習一以小學大學所以教人之法循其次第而勉進焉他日居官在朝致君堯舜在外則澤被黔黎出處進退不離乎道不愧古君子之儒然則往年相誤之罪庶可少釋異時倦遊而歸尤望交修之益也朱子嘗謂就使六七十嵗覺悟亦當札定腳跟從此做去文公豈欺我哉願相與勉之書羅生君行仁政斯民親其上死其長題目孟子此言非特鄒穆公之龜鑑千萬世為人上者所當篤信而勉行者也後之讀其書者以是告其君所謂引君當道庶幾可為忠臣以是告其親所謂諭親於道庶幾可為孝子祥也方家居而未出仕余固不能不以孝子期之祥也勉旃謂其親不能者賊其親者也祥亦有此懼耶祥誠不迂余言勉進諭親之孝他日進用於時其為忠也自是而推之耳夫豈待他求哉若然則病夫之望遂矣向因文王發政施仁之作嘗有所告未見領悟故再以申之書俞洪文後所作時文題目無非切於身心如此三題者所謂自得在深造以道所謂君子存之異於庶民而聖人又異於君子所謂文王愛民深而求道切終日乾乾不自滿足之盛心何者非切於吾身心者若能以之自省曰吾能深造以道而自得乎吾能存之如君子而異於庶民乎抑去之而無逺於禽獸乎舜與文王所行如此孟子嘗曰人皆可以為堯舜又引公明儀曰文王我師也周公豈欺我哉則是舜文之聖皆吾人所當學者吾嘗有此學之之志否乎以是自省強勉而行即是為已不差路途庶幾由是漸有可望今則只是以之作文求取科第略不關於身心縱使異日得遂所圗不過為富貴之人而已天之賦豫吾人者如何而自暴棄之如此可不哀哉此意近屢以告諸生而略無信向匪特不信且不疑焉故再以申之簡同年熊汝明往在清豐屢辱書教自遷官西行音問杳然病夫時展畫圗玩手筆感舊懷人之念不能已已不知此生再晤語親密如曩昔觀政銀臺省否也生東歸時辱贈詩期勉以道德至今佩服不敢有忘但索居日久過失弗聞恐終負故人相期之至意耳自西行弗聞政譽道逺地僻故然然即清風推之惠政之及人可知矣未知近得幾子若有上六七嵗者便當一遵文公朱夫子小學之教步步教將去不當又如吾輩差却路頭迷而後復之難也小兒今年二十三粗通文理所幸略知為已與汲汲追逐時好者有間用是敢致忠告如前之云在他人必謂迂闊之談以閣下髙明決知度越俗流也岐山縣正統丙辰中一進士曰傅寬選東昌通判坐事發戍敝處景泰中生從之學舉業天順初釋歸卒於家其子孫存者幸以生故遣人呼至官視可教資送入學不可教一周恤之以見生之不敢忘棄故師之意至幸至幸兹朱倉宰失官歸云嗣嵗欲往鳯翔訪其親舊故作此以奉渠歸幸還一簡至切之望碑帖書籍度生所無者惠下一二甚荷與史揮使國章聖人作書教人讀之明理修身推之治人也武官雖藝為尚然不讀書明理豈能忠君報國克盡人臣之道哉余所以惓惓勸爾讀書者為此故耳前日面㑹相勸已得允從云一日能讀十行一日能訓解十字若果能如此則半年之間訓解字義將及二千書皆可讀矣就使日減其半日訓五字一年之間亦有此效若是不學則一年之間不曉一字直至老境無分毫之益豈不哀哉今㸃孫武子送去此汝武官本經今日急務可便讀之暇日却來為解釋其義也㑹間更當告以所當讀之書兹不以告者恐爾憚其難而生疑畏之心耳勉之勉之與鄧都閫欽之不才荷蒙誤舉母老身病有孤盛意愧負愧負更望執事充此為國薦才之心廣詢博訪不間幽顯茍得其人隨其才德之巨細或上之朝廷或薦之鎮守或用以自輔或委拔衛所以主軍政此忠藎之大端也若以生之不才有孤盛意而遂沮夫薦賢之心豈可乎哉惟髙明勉圗之與士咨帖子為訪賣子女者何姓名果缺何官府債如是督府當告令免之不告則孤平日相推之意吾黨得以薄待人之罪矣晏朝士未相識一聞其和輒悔失不以白金十兩贈其行況此部民為貧賣女償債使骨肉分離者肯不憐之吝三數兩白金忍視其至此極耶二事之輕重緩急得失可否不俟智者而後知若以奉告無不從者縱令已賣為之贖歸亦無不可以類推之凡有負於府不能償者可一切寬之亦父母斯民之一端也不致忠告吾黨之罪告而不可斯可已矣與韋中貴書户科養病丁憂給事中侍生賀欽頓首上書欽差鎮守遼東御馬監太監韋公閣下竊以孝於親者亦欲人之孝忠於君者亦欲人之忠蓋推己以及人聖門之所謂恕也欽竊願學焉欽自幼讀書應舉不敢茍狥俗以榮身肥家為事惟欲隨所居之位盡事君之忠而已然而三十登進士第三十一選給事中三十二即以病告歸者非不樂仕也蓋不得其言則去儒者進退之道固如是也屏居以來二十餘年分甘田畝無復仕進之心閣下所深知者不意今上即位內閣大臣舉薦人才欽之愚忠誤居首選蒙恩升陕西右參議撫治商洛等處提督官軍民壯兼分守漢中府地方賜敇諭以戒勉之欽方欲以身病母老具辭而不幸老母謝世矣竊念雖居憂病中不之任而當日在科未久年勞淺薄參議職名理不當受謹遣小兒具奏辭免乞收還恩命并繳敕諭又念欽雖然家居猶叨言職幸逢明聖可言不言不忠大矣用是謹陳四事少裨㳙埃蓋思以效愚忠之萬一也內一事曰遵祖訓以處內官者欲朝廷鑒已往之失䦕方來之制謹遵太祖髙皇帝御製皇明祖訓之治也且太祖髙皇帝之訓即古聖帝明王之制非全不用內官也非不與之祿非不與之秩非不富且貴之也特用之內庭使修其當為之職分而已不假之軍國重權使害家而凶國也修其當為之職分則祿秩常保富貴無失而無踰分干紀之禍此所以上下相安君臣相慶我皇祖之訓所以厯萬世而無弊者也遵之弗違不惟我國家聖子神孫萬萬年無疆之福使內臣各安其分守其祿秩保其富貴永無復如前日王振喜寧舒良吉祥等專權僭竊殺身亡家滅宗赤族之禍實亦內臣萬萬年無疆之福也然欽竊念閣下雖亦內臣然在邊疆身先士卒親冒矢石奮勇爭先自少而壯壯而老矣與其他鎮守內臣不理邊事害下罔上者殊科若閣下者實忠義為國不私其黨者也且聞參戎羅帥嘗言閣下今秋決欲辭老請釋邊寄區區之心益深敬仰以為閣下解一已之事權固己見其善然未可謂之至善也豈若充平日忠義為國不私其黨之本心上章極論使自今內臣一遵太祖髙皇帝祖訓之為至善哉如漢之內臣呂強以忠直流芳既懇辭在已之侯爵不受復上疏直詆其黨弄權壞國不應封侯違髙祖重約至今千百載香名偉績載之青史傳頌萬方當與天壤俱弊也閣下歷覽前史夫豈不知今閣下忠義為國之本心何讓乎呂強然豈可使呂強専美於前而不致思齊之力以求儷休並美同垂不朽耶且人生於世多無百年而乃千萬年不朽者忠義大節有功於世道故也閣下今踰六望七矣其去百年復能幾何而不及今圖所以不朽者茍以遲疑失之豈不為終身之悔九泉之恨哉或者曰韋公平日待子厚嘗稱揚以勵諸士子今若此必得罪於公矣子方家居而得罪鎮守重臣子不懼禍哉欽應之曰不然公之厚我非有所私也知余愚忠故也惟公克忠是以相知今余之此舉正愚忠所發也公之克忠正當有契於心耳夫豈私其黨而以為罪哉且盡忠於君臣子職分當然也吾知盡吾當然而已耳禍福之有無豈所計耶或者又曰子進諫於君可矣而又告之鎮守內臣使言於上蓋慮已力之薄而反求借其黨之力以攻之耶曰不然也余之進諫於君蓋希慕為忠臣也而又告之韋公者知公之忠不私其黨力能行此故以告之而成之為忠臣蓋蘧伯玉耻獨為君子又吾夫子所謂君子成人之美之意實區區所願學推己及人之恕也豈曰吾力薄而求借其力耶或者之疑以釋用敢備録為書并録呂強當時所上漢帝奏疏以獻閣下試於靜中令知書者講讀數過決意行之使天下之人皆曰韋公者當今之呂強也不其偉哉不其偉哉孟子曰人皆可以為堯舜呂強云乎哉惟閣下勉之無負區區之望然是舉也閣下果能深信愚言不謀諸人而決行之上也謀之平日忠信正直識見超卓之士終必贊而成之其次也若與患得患失同流合汚待公衣食之人謀之則讒諂交作胡能有成斯為下矣公其慎哉且是言也欽一告於君以吾君之明聖足以納忠諌不敢不告也再告於公以我公之忠義可以致忠告不可不告也是欽之所以待公者不輕矣公無忽哉公亦自重哉若曰言則美矣吾弗能行也則孤負平生之忠義不能拔出其黨如呂強之流芳永世矣豈所謂自重耶千萬載之功業聲名坐一時裁決之不勇而遂失之豈不痛哉豈不惜哉言之諄切詞之重復情之不能已也惟明公鑒納之幸甚幸甚醫閭集卷六
