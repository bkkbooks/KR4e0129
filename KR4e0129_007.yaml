body:
  text: 醫閭集卷七明賀士咨編存稿與陳聲之前日清河獲功可喜可賀病夫恨不得面致鄙忱耳閣下平素忠勇得士死力乃今遇敵果有成效豈不偉哉然丈夫忠君報國建勳立業正在此時羊山之捷其發端耳不可以是自足也嚴號令明賞罰謹訓練布恩信熟韜略益求為將所當然而未至者無不勉焉則所建立當烈烈轟轟如古賢將照耀簡册也寧止是耶前勸閣下法种世衡教射法閣下行之亦略效矣往年假諸閣下者今為造銀牌二十面面重二錢謹遣奉償以繼行之久當得效同世衡也勉哉勉哉餘惟心照録世衡射法書其後以告陳聲之此載自警編政事類中欽嘗舉以告人信古者少若無聞焉惟前都督李參戎公嘗以銀的誘射略如世衡之法當時翕然向化人人以弓矢為事不幸未久即謝世不及睹其效之大成也今敢備録以告惟賢弟奮然勇為不為俗情所牽制將見明效既臻邉方愈固職任克舉聲譽益隆公論攸歸榮遷可必也事不師古以克永世匪説攸聞古人不我欺也吾弟勉之又射銀的不聞其詳謂當立一的於教場不必銀者使欲射者先於此演之日日如此其世衡餘法爭差役與該杖責射能中則得優差與免責治者亦嘗行之否然不止此吾人當師其意凡政令之施皆當凖此而行也自來不得一字之報謙巽之過即成柔懦矣惟吾弟思之又聞道細河多美政吾弟見賢思齊而後已必不徒羡人而甘自棄也嘗見前輩不自用能從人之善新施總兵為都指揮守義州日操軍有法義州少能騎射施公操演時不分官軍舍餘悉令騎射時總戎韓公以邉事降指揮同知備禦錦州聞而使人視之不數日其操演一以施公之法不嫌於學人也以故韓日以髙為時名將不知吾弟師人之善亦有恐人謂我不如彼之嫌否如何漫記戊午九月二十七日射西門外會髙姓舍人自云貼邉十許日歸貼邉亦虛應故事耳遣去貼邉者多有疾生瘡者無瘡疾者類多軟懦不能弓矢間有勇捷能射者不多也自言渠貼某臺臺軍五名三為南人二人取米有來攻貼邉軍二名各持一牌自衛反命南人射南人辭不能而持牌者竟亦不射守臺貼臺者俱不精如此可乎九月西門外習射會二舍人自貼邉始回云前日某千户率某等十人往貼邉見某不任辛苦一宿命某歸余曰汝貼何臺曰清水臺軍俱被虜去却遣人貼之臺軍少可以貼臺無人矣貼者能獨居乎名曰貼耳實不往也可居處居之耳為將者當用勇敢智謀忠義之士為腹心頭目手足之任勇敢者不退縮智謀者能料敵忠義者能為國而不為家為君而不為身所益多矣若或所用失人懦弱者先退遁以為民望無謀者率迷惑以失事機不忠不義者惟利是貪而已豈知忠君報國親上死長之道哉將之用人誠不可不慎也一隊官軍二十五人多者不過十四五少者僅得五七人而已餘皆入私門矣軍政如此望其克敵不亦難哉經年不操兵何由精兵士貴操演訓練使有勇知方可也賞罰不明則軍士孰肯用命當臨陳時則退縮不進人得首級則從而妄爭焉其無勇無恥亦甚矣哉一人獲馘數十百人聚而爭奪之壓斬者氣不得出幾至於死既解得首級者雖負痛以獲功故弗言為將者明知之而不究亦何以懲後耶謂當治爭奪者之罪使有所戒庶後有懲人各奮勇殺之不至叢於一反傷吾人而失脫當斬之人也斬首爭奪由狩獵爭奪而然能禁狩獵之爭奪則斬首之爭奪自息矣邉城濠之外當築土牆圍之屯榨周密日常省視以防越城之盜濠當注水環之不宜空也懷柔伯在任當久雨時遣人呼王馬陳魯許等五六千百户語之曰連日雨我日日心在邉上幾回汝等可各往某處治其水口慎哉朝廷疆界施某地方纍及爾等往治數日畢功歸乃設酒筵之曰朝廷疆土施某地方纍及汝等飲畢遣之後來將官慮及邉事既少而禮接下僚者尤不多見也人或舉此告之則拒而不信或信之反輕其為失威嚴也紀信陜西鄠縣軍餘曉暢軍法白尚書用兵陜西時嘗信任之翁泰李錦威寧學生治周易有學識持身不茍李嘗寓京師有王千户者聞其賢欲以為贅壻不從右三人聞之工科髙文著支禧蘇州崑山學生制行不茍有不樂科舉意聞之同年徐文亮云陳先生江西章貢人隱居著述不求人知徒步百餘里為人療疾不受其報六七十時猶如此著韻書解周易其易圖次第與康節有小異云韓先生幼倫通州衛千户兄嘗業舉子以有司待士之薄遂絶意不為閉户讀書以著述自樂右二人聞之蕭文明先生云御史張璹雲南人嘗按福建有一縣丞驛丞素貪暴善逢迎賄結上司以故歷數年巡按按察官為所誘不能去張始至首究治之奪其官由是福建之貪酷不職者率多望風逃去一日在科中與丘掌科論及風憲官丘誦張之風力如此且曰吾今四十餘所見御史惟此一人因又嘆人才之難也章德懋云論語齊景公有馬千駟章最能警發人又曰當以西銘為心腹又嘗言人如何得為御史給事中既得之若不言却是蹉過了也謝元吉言人看聖賢之書當如看相書然乃有益人觀相書如言鼻髙隆則吉低折則凶必以鏡照鼻自考曰我之鼻髙隆耶低折耶髙隆則喜不然則憂矣如言面正滿則吉偏狹則凶以鏡照面自考曰我面正滿耶偏狹耶正滿則喜不然則憂矣讀聖賢書如言仁義言禮智與夫不仁非義違禮弗智一一自省於身我果有是善我果無是惡耶以是而為憂喜以致思齊自省之力則庶幾其有益不然雖誦之甚習記之甚富亦何益於進修哉所管之人教訓須常以忠君孝親報本道理及進止擊刺之法啓發警告之不厭煩可也年年有敇燒荒去却境外荒草使敵人逺遁如何有燒裏荒之理我曽面見都司王備禦大人他説不曽燒賢壻可自斟酌他日城中無燒柴牛馬無穀草要荒草用修邉人馬用柴草何以得之又射箭一事賢壻莫道我已能射要必步下馬上日日習之軍士當以敵愾為心於武藝固當致精而凡一語一默一動一靜皆專專以武為念可也講求陳法攻戰擊刺奮忠立節除患安邉一切著實事務雖戲劇亦以武事如李廣好射席間亦以射為戲且凡飲酒扮戲又皆取忠勇者詞曲談話亦然久之成俗人人皆忠勇向義於安邉何難哉往年巫總戎軍令凡一應官軍舍餘人等出城者必操弓矢無者不放出駕使牛車者每車必兩人持弓矢方得出至今人稱其善勸鄉人習射种世衡初至青澗城逼近敵境守備單弱芻糧俱乏世衡以官錢貸商旅使致之不問所出入未幾倉廪皆實又教民吏習射雖僧道婦人亦習之以銀為射的中者輒與之既而中者益多其銀重輕如故而的漸厚且小矣或爭徭役優重者使之射射中者優處或有過失亦使之射射中者則釋之由是人人皆能射比數年青澗城遂成富強於延州諸寨中獨不求益兵運芻糧右自警編政事類所載者世衡誘射法行之青澗比數年人皆徑兵敵不能入或者曰世衡宋名將青澗城种所蒞雖曰以銀的誘之射然以威令行於所蒞誰敢不從其成功之易固當也今子以給事養疴林下教止可行於館下生徒而已餘人孰從焉余曰不然吾州舊名宜後以尚義者多改今名然在昔多尚義者今獨不然耶是事也世衡行之輔以威令成功固易今以不相統攝之間人行之誠亦難矣然不曰州之人尚義者多乎尚義者多則雖無威令人自知其為義而勇為之其成功豈不亦易耶况吾人雖病居亦時得見分守備禦千總百總管軍諸公談論及此必曰此吾守土在位者之事病居儒官乃為之吾可不助成之乎必下令城市鄉村凡在官不在官一切之人俱赴某處習射中者某以銀的弓弦為賞不赴者有罰又何患不如彼之有威令耶三數年來人人皆精於射敵不敢入邉得以固人得以安共享太平不亦休哉敢告吾鄉尚義諸君子共力成之後之人必將論之曰是舉也病夫某倡之時某官某某賢士夫某某助之是用三數年克成此美事也使非病夫之信古不顧時俗非笑奮力倡之數百年美事固莫能繼非諸尚義賢官僚士夫助之雖或倡之亦莫克有成也如此則無愧於我義州之人而義人之尚義信有徴矣不其偉哉又世衡誘射法最善病夫憫人之生長邉方年力強壯者不習弓矢卒然遇敵奔竄不暇然亦莫克免難也用是妄意舉世衡此法以勸誘人射以為在古既有明效今人行之亦豈不然然人之所見不一或者曰世衡將也有事權者也將有軍令有事權則有所統蒞青澗城种所有之土也有土斯有財有財則不患於銀的之不繼矣行軍令於所統而銀的又無窮焉此所以不數年能成功也吾子病辭給事歸非若种之為將有威令也居間林下與民庶無關非若种之有事權也子有土田不過數百畝所收入常不足以贍家口時貸於人以取足非若种之有土有財而銀的無窮也坐此三不如亦欲如彼之成功吾見其難也余應之曰子之言不為無所見也然知其一而不知其二也知其勢之所驅不得不然而不知其理之所至自不能不然也是舉也至於人人能射則人皆徑兵敵安敢入可以保邉疆盡報國之忠可以衛父母盡人子之孝可以保身家而為智可以庇鄉黨鄰里而為仁且吾州自古多尚義士是舉義舉也自昔天子諸侯大夫士皆有射禮率以此為重以吾尚義之士一聞病夫興此義舉以勸之其心孰不欲為忠孝仁智者其勇於是不啻水就下也奚其難且人心天理人皆有之患無有啓發感動之者耳今此諄諄反覆諭之曰射之為義古聖所重自今觀之上可以忠君孝親下可以保身及物啓發感動之如此其從之易固也矧吾州多尚義士耶人皆如此為義舉則為之勇為之勇故勸之至勸之至則感發興起者益多將無所不遍矣又何專恃乎勢之所驅利之所誘耶尚義者何取於利利之所誘特村夫小子耳何患乎無威令無事權無銀的以繼之也昔吾夫子答仲弓為政之問曰舉賢才及仲弓慮其不知乃曰舉爾所知爾所不知人其舍諸今吾人誠知此舉為義所以勸之誘之盡吾所當為竭吾所已有矣安知吾州之有威令有事權有土有財如世衡者不有以驅之誘之耶其尚義者不有以繼病夫之所為耶是又何患世衡之不如也或者又曰子居間不治汝儒業與及兵事不為統兵者嫌乎曰吾人自念進不為朝廷用退不為鄉里益吾恥之故雖老病益勉為此蓋求小補以免虛生浪死之責也非與爭名也非與鬬勝也惡乎嫌或者又曰統兵者之不嫌子言是矣鄉之人不曰子欲舉行義事當自力也何纍我以財耶余曰前嘗言之矣蘧伯玉恥獨為君子事有非獨力能成者是用有請於諸尚義士夫也或者唯唯而退因次其語以重諗夫鄉之尚義者成化戊戌告祭四代祝文粵稽古禮支子不祭宗子主祀支子相之雖不躬獻心得以安惟我先祖世為鄮人洪武之末先考來遼家於義州生我不孝蒙賴先德讀書登科列職諫垣謁疾家食四時祭祀止於考妣私心不安日以滋甚且自我祖上及髙曾墳墓在鄮未能展省伯考有孫衰弱弗振依於族人僅免寒餒祭禮不舉推此可知竊念本源戰悚無地古人制禮蓋以義起雖無列鼎亦竊朝階忍泥古儀棄先祖祀用作神主恭奉祠堂禴祠蒸嘗無敢或怠尊靈不昧來憑來依享我孝誠永錫遐福敢以清酌用伸虔告尚享祭胡士宣文維年月日居憂病夫賀欽遣子士咨謹以清酌之奠致祭於胡秀才士宣之靈曰維子之德兮剛介誠淳服父師之訓誨兮正道克遵凡世俗之趨好兮百不一慕聞齋居而幽獨兮潛心內務維進道之有基兮誠豫心之所喜逰吾門之朋儕兮鮮與為比方進修之汲汲兮逺器是期胡造物者之爽其報兮夭折隨之嗟我於汝家兮世世親姻况汝父子兮來遊吾門汝訃忽至兮我淚沾襟力疾哭汝兮摧傷我心從今永訣兮悠悠終古遣汝友以奠汝兮辭以敘豫情之哀苦汝生於豫言兮靡所不從我今告汝兮汝其豫聽嗚呼哀哉尚享祭古墓文維年月日户科給事中賀欽遣園丁朱紀以隻雞杯酒之奠昭告於前朝古墓主人之靈今歲之夏園丁作廬掘土築牆石棺以見奈何愚夫蔽而不告埋骨别所取棺入城貨人為槽用飼畜産自恨無德化及家衆乃致園丁為此不仁知之後時改過遲暮謹以遺骨復歸故器深埋堅築志以封土期以久逺更無他虞世俗衰薄殘忍成風石棺飼畜比比皆爾曽念古人骨棄何所我亦人耳忍復用兹安得仁人在位行政各使遺骸得歸故藏德薄力微痛惻而已謹遣園丁酌酒謝過不亡者存鑒此誠意尚享策問問馬營之設本以屯兵禦敵良法也以遼東各城言之營堡具在而廢舉不同或一城六營俱有騎卒每三營統以一都閫者或一城數營廢舉相半營置一指揮者可指實而評其得失歟以義州言之曰清河曰義寧曰鎮邊曰青榆林曰大安曰綏逺其營亦六何以但存其名而空無一人一騎歟豈他城宜舉而此獨宜廢歟抑别有難舉之故歟或者謂正統間北兵大衆侵廣寧時以衆寡不敵收營兵集城中兵退宜如舊遂因循以至此其果然否歟又有謂六營之土田俱饒沃營設步騎二三百且耕且守不惟邉患以袪而軍士得養一舉兩得莫便於此其論果可行歟舉者是則廢者非廢者得則舉者失二者必居一於此矣請為我言之以告於受邉寄者問見可而進知難而止用兵之常道也而孫子亦曰避其鋭氣不若則能避之又曰小敵之堅大敵之擒是善用兵者固在能勇能怯不可一於進而不知止奈何後世有逗遛之法焉此法一行則可進者進不可進者亦不敢不進矣不可進而不敢不進其於所謂避其鋭氣與不若則能避之者亦有所戾否耶漢光武起自兵間為帝而除行軍逗遛法其果知兵而然耶朱子作通鑑綱目大書於册其以為善而美之否耶除之誠是也則今之任將征伐而復以不能兵者監制而督促之豈不有哥舒之敗耶願明言之問古者兵農不分三時務農一時講武亦足以保邦禦侮成善治也後世岐而二之以農供兵兵則四時在行伍肄戎事可謂專矣何為禍亂相仍反古者兵農不分之不若耶豈專者顧不若分者能保邦禦侮耶抑别有其説耶入我朝來兵農之分固不可復合然洪武永樂間遼東之兵八分農種二分守城邉圉亦固外侮不生至於今日農種守城之數則反之矣戰守者不為不多而時或猶苦諸邉之侵擾何耶豈雖多而不精耶抑别有其故耶農以養兵以八養二可矣乃今反之所以銀糴中鹽多方措置猶不足也今縱不能合兵農而一之得反二八農守之數使兵之戰守者雖少而精且不待求給於農種之外邉防無虞大費亦省必有其道幸為我言之俟當道者有問願以告焉醫閭集卷七
