body:
  text: 醫閭集卷五明賀士咨編存稿簡石齊陳先生拜别年深可勝馳慕追憶早嵗京邸奉教之時如在昨日所恨天各一方南北萬里先生年近古稀生亦逾艾望耆不知此生再有承教之日否也興言及此不覺墮淚别來二十六年立志弗堅用功弗篤只是舊時伎倆人物大負先生教愛盛心慚懼之甚屢詢知太夫人萬福先生道化大行喜慰無量生雖不才不敢以衰老自棄伏乞惠賜藥石之言以祛沈痼之疾誓竭駑鈍勉奉求進庶不終墮小人之歸也小兒士咨去年山東鄉試叨中今年下第未歸此兒極慕仰先生之教幸因風加惠一指引之當不似乃翁負教之深也今作此書寄士咨俾託貴鄉下第舉子附上料在今秋定到便中乞回數字寄京中鄉貴託轉至遼東甚幸甚幸言不盡意伏惟心照不備又奉别十載慕仰如一日今年三月末鄧官人至得拜瞻半像并領手教及三詩諸草札喜慰感佩之深不可云喻端默之訓實示以入道之門積德之基所以教愛欽者至矣謹銘肺腑惟是此時為養母治生之故未果做此工夫只且勉於持敬以收此心須異時家計頗立菽水無慮當償此願也恭聞太夫人以下均慶太夫人年髙康强榮膺褒旌之命諸子姪力學不怠相從問道者以百數南方貴宦就謁恐後鄉邦之人薰德而善良者日以益衆然則先生雖不為世用大行於時而此道之行於家傳諸後孚於人善乎俗者有不可掩也第以病體牽纏南北萬里不得朝夕侍函丈為此生之大恨耳鄧官人之事欽雖勉為盡心以德薄言輕之故不能使之蚤歸又以貧故甚失款待萬乞不罪因其歸謹此上覆髙麗布一匹人參三斤託附上用表下忱伏乞為道自重不備又七月十二日始得潞河發舟前一日書具悉雅懷欽向於京師聽教一年餘雖鄙陋之質不能少變然非先生之教則患得患失之鄙夫耳今幸免此得不為祖宗門戶辱其恩不亦大哉先生之恩固不啻此耳其所以教育欽者必欲勉進於道是誠父母之恩也顧欽庸下不能自振然勉奉教言誓死不敢廢焉耳欽比自謂此出不喜得是官所幸遇先生自今思之遼越萬里又欽之大不幸也欽自抵家杜門調攝今秋於後圃搆小齊三間為養病讀書之所頗幽靜朝夕處此以奉先生之教此外他無所慕顧猶未能少見意趣無可以請問者日後若知所疑續當求教向欽作桐鄉深處詩雖不成語然末二句云何時三十六巖下日與堯夫御小車則實欽之素心皇天祐人不識何日得遂此願也向書喻以貴處無人於遼東往還然亦少耳非全無也若能閔欽之久違函丈因便賜教莫大之幸孟冬作此附子仁處轉寄不能盡所欲言惟先生亮之又奉别以來三十年矣斗山之仰無時不然自恨立志弗堅有孤至教因循嵗月年已及耆略無所就假令自此有進所益幾何況違函丈南北萬里索居多過誰其針之其不得為君子而終於小人也昭昭矣奈何奈何四月末拜領去冬手教并詩稿一帙乃知先生居太夫人憂已踰期矣太夫人節行表世壽至九十厭世上仙固其宜也然無奈先生孝愛之至何不審憂中氣體如何況先生年已七旬當從權制伏乞節哀順變以副四海知舊之望來喻謂方今論出處者云云擬人必於其倫生何敢班於先生哉然此取舍之分不至昏昧太甚者伊誰之教耶生之所以沒齒感恩者也自恨云云惟先生閔之不以不可教而棄之幸甚小兒士咨蒙先生惠書奬進之不敢當不敢當生老矣自愧有負至教欲期此兒以不負不知果能如願否惟先生垂惠不勝幸甚前後所惠詩朝夕捧誦儘有警發但與范長史者至今未領為寒家一逰蕩子持去山東揚州至今未歸范有録稿亦未寄至耳相望萬里匆匆不能盡所欲言惟心照是荷又往年承教於都下恩惠之厚沒齒不忘别來十有六載慕仰盛德如昨日然時一展拜尊像便是即溫聽厲也所恨賤疾拘牽未有再拜之期兹聞先生四月來京寓慶壽方丈相去益近而不克一面以承矩誨小兒咨年幼未堪出外不能遣之一拜牀下其為抑鬱不可勝言先生此來傳聞弗的或云以薦舉或云以罣誤不知尚有幾時留容昔之諸友幾人從行諸賢子姪幾人在侍去年冬小姪往山海關在鄭克修繡衣處領張叔亨繡衣轉附先生前年十月二日與欽書并和陶詩寄欽絶句所以教愛欽者至矣書中復以莊定山得靜中一趣發欽讀之惶汗浹背别來屢承此教而竟不能脫擾擾於方寸其負教之罪甚矣然而猶望先生不以是棄之因風更乞開喻自今以往猶當鞭策駑鈍冀有少進也兹敝處李參戎第行遽不能盡所欲言髙麗布一匹奉為禦暑之服人參二斤用備湯藥之需伏乞叱留幸甚又欽往年京師承教誨之勤恩同父母奉别至今忽忽九載企慕之私無間時刻屢辱惠書教并紀夢說自策讀近思録諸詩及門下從逰諸友論學書每一拜領如飢之得食渴之得飲感佩恩教莫可云喻第昏昧之質立志弗堅加以壬辰析居以來創搆室廬課治田事不克專意於學是以雖荷教誨屢屢未能少進愧懼之至推其病源又以不知其要耳何者往時見書冊中先聖賢垂教之言及親承先生之誨或涵養或省察或致知力行無所不信無所不悅隨所聞見以用其力特以實非自得不知大要見無一定力且弗專坐是迄今無少改於其故耳今者屢承開示潛玩久之乃知此理充塞天地貫徹古今無處不有無時不然事事物物各有本然之理吾人何必勞攘勿忘勿助循其所謂本然者而已然雖見得大意如此苟非格物致知灼見事事物物本然之妙烏能勉强以循之此知之所以當先也然非敬以涵養此心使其常主於中不馳於外則身且無主雖視不見雖聽弗聞至粗至近者且不能酬應之況於究義理精微之極乎此涵養之功所以又在知之先也以是知今日用功之始惟當先事涵養放心不收終難為學此則決無疑矣林緝熙端默有見誠晚學所當遵行也欽又欲求僻靜處若山寺中靜坐以收久放之心第老母年髙無他兄弟備養理無可出今春二月攜一二生始就本城奉國僧寺杜門調攝旬日一歸省母於是收心讀書然亦弗能纍旬端默但孜孜持敬以收放心之意則弗敢忘耳前時因循負教罪過千萬自今稍識用工寧敢復蹈故轍以自取絶於大賢君子耶自是以後積纍久之幸有所疑所得續當請教仰惟先生道明教行樂莫大焉欽之不肖再得親炙函丈不識在何年耳相望萬里不勝馳情兹廣州楊官人貿易畢事歸謹貢此書無以侑緘髙麗布圓領一件敢以瀆獻不罪僭易幸甚未簡伏乞為道自重不備又生承恩教沒齒難忘但進學不力退處九載無少進益秪自愧懼然亦豈敢違悖至教自絶於善亦惟日夕以持敬收心讀書玩理為事積之以久看又如何所恨邊關限隔不得尋醫嶺南以療此生深痼之疾得遂此願未審在何年也生侍母粗安去冬復得一子名浙孫生之先四明人故也田者數人嵗入不足假之故舊類不納息用是度日不至勞心既無他慕衣食復足别無所事敢不專心以奉矩誨惟先生不以愚鄙斥外而終教之不勝至願今夏五月廣州楊官人倫貿易遼右歸嘗託附書一緘髙麗布圓領一件兹金溪書客李紹慶回託附此書并人參一斤致羅一峯先生所轉奉有教墨回示附湖西與李客渠嵗走遼東故也相望萬里承教未由企慕之私非筆可盡伏乞為道自重不備又往嵗膺薦來京時辱惠書教并細葛感慰深矣所恨萬里之遙十數年之别而近在千里之間旬日可至之地拘以賤疾不能趨拜以遂親炙之願自兹以往此生再得坐春風而霑化雨者果為何時也南歸後伏計奉養之餘以道自樂門下相從者日益衆而及人之功大矣於是又羡南方士友之幸而重恨在己之不幸也别來二十餘年自愧立志不剛用工不篤不能勉奉矩誨恐終流於小人之歸而已先生愛我厚者其可以救拔之者何憚苦口耶去年四月吏部發下文憑促欽赴陜西參議任時以老母卧病纍月方欲以終養具辭而是月二十六日母病不起矣五月初母喪在殯而敕諭下臨襄事後乃遣小兒士咨具本繳敕辭免新授職名伏惟吾君初政清明多所聽納且念欽之不才雖以病廢然職名未奪時不可言不言可也可言不言如不忠何方草辭職終養奏本時擬陳四事少效涓埃遭喪後欲削其槀心不能忍欲俟終喪恐失機㑹用是不以一己私憂敢忘天下之慮因辭謝冒昧以陳曰資真儒以講聖學曰薦賢才以輔治道曰遵祖訓以處內官曰興禮樂以化天下本以六月下旬進無奈誠意未至學術膚淺惟蒙聖照得允所辭所陳四事斥以浮泛難行罷之矣內自循省惶恐無地恨相去逺不得以章草求正其所以失也先生抱道家居天下蒼生同一仰望欽不度人微言輕輒有論薦非特不能為蒼生起安石且恐以薦者之不肖反為先生纍矣上天祚皇明斯人惠然來天豈終負人望哉士咨今年二十五竊聞先生之教有意為己之學科舉事業雖嘗為之然內外重輕已能決之殊不好也此子若可進恨不得親炙門下求薰陶之益耳先生誠閔之因風賜教則欽父子感德當何如哉番禺解軍者劉深歸謹此奉問不能盡所欲言伏乞以道自重不次簡同年㑹元章翰林自執事調任南都後欽亦以病歸不通音問者將二十年中間子仁嘗録寄贈執事致政詩始知執事由評事轉僉憲挂冠歸矣後令親方老官來寓族兄客邸始得備聞執事家居動履之詳足慰鄙懷同年雖衆相知者不多就中所尊仰願學者殿元㑹元元吉孔易仲昭數公而已所恨天各一方無由親就以資啓迪之益耳應魁兄數年前嘗寄書來遼還聞已為古人可悲也己前年陳白沙先生徵至京時有書寄欽云嘗與莊定山㑹聚笑語竟月許定山得天理之真樂執事想近年未㑹白沙耳其得天理真樂當不異乎定山也欽病居荒僻侍奉老母溫讀舊書而已學無寸進且入老境恆懼終墮小人之歸貽羞友朋尚念平昔因風示教敢不佩服以希少進令親客此殊失敬兹因其歸謹此奉問不能盡所欲言且愧無物可以將敬渠復來遼切望手教千萬之懇相晤末由不勝馳慕惟冀以道自玉不備答同年鄭克修御史近辱書具悉雅情且以桃乾逺遺老母感荷感荷所喻相見未果徒是說過然人有善願天必從之終必遂也來書屢致下問自顧愚陋何能有助但往年在京師嘗聞白沙先生教誨頗多直以立志不堅無勇往力行之實坐是無所進耳今敢以所聞至切要者奉告冀今彼此共勉為之白沙之教惟以靜坐為先其意謂吾人今日病在擾擾必多用靜然後放心可收次第可用功矣如何如何前所云韓子作文亦進德事先正己論其倒學不敢承命小兒士咨學作易義承改教甚荷續所命題未作求教者小兒之意以誦讀玩索之功不至故先其急者耳令郎進學如何今之人以為己之學一筆勾斷只在舉業上走亦大不是小學載胡子父兄以文藝令子弟朋友以仕進相招往而不返則心始荒而不治者不可以不深戒也令郎學於家庭想不專事舉業就使來游門下者只為舉業而來吾人亦不宜徇其卑陋之見不以為己之學啓之也小兒頗有為己之志他日遣往求正尚無靳焉臨楮不覺叨叨不罪不罪又近審起居佳勝酒量如舊甚慰甚慰令親毛老官曩多失敬屢荷書喻無奈德薄言輕不能小有補益罪罪令郎輩舉業工夫想大有進不知所謂為已之學亦嘗留意否若曰吾人未嘗為是遂不以責望後人是已失之而又使後人仍蹈覆轍也善教子孫者恐不如是世俗日降言為已之學便為迂闊得罪當時矣然髙識逺見如閣下者豈亦有是惑哉亦謂即此是學雖不必如文公之教由小學循序而進要亦不背大道終為君子路上人物也然亦不思而已矣誠思之寧肯安於是哉韓歐與程朱其源泒孰正豈可曰韓歐亦君子而何必尋程朱之源乎閣下愛生厚用敢吐其愚不罪狂妄幸以語蕭先生斷其可否垂示一言不勝大願又舍親盛都司克新舍人至辱惠手書捧誦之餘如見顔色但不知何日合并以話久闊之情遂切磋之益為可恨耳扇三柄棗一斗多感逺貺來書深自謙抑足見不自滿足之心然亦須勇往力以著實下手看所進如何好與朋友商量若曰自來讀書秪事誦說擬議題目拘就程式僥幸科第為身口之資則是早年為學為人之失今日所當痛革者也兹豈可仍以自謙且以誨人與教子弟邪足下云欲從事乎靜嘆無下手處似亦過乎謙退非無處下手蓋亦實不下手耳所引無欲與心不妄動蓋靜之成功吾人固未敢望然自今勉遵節欲之訓禁戒躁妄人心未必不可下手也狂瞽之言敢以求正尚有以復我為已之學誠所當勉令郎染俗未深無使又蹈自棄之覆轍也匆匆不能悉幸察納之簡同年羅一峯先生甲午冬季始領令親梁氏附書今年五月復領金溪李客附書具悉雅情不勝感荷恭惟先生學成德尊退處田里士傳其學民化其德纂集六經羽翼聖道欽嘗自謂士之進退各有其道茍退而無所猷為甘自頺靡其視進而尸素者何逺哉欽之不才恆自愧懼聞先生之風益深斗山之仰承風疾或發艱於步履願加調攝以拔其根陳白沙不偶於春官而道鳴南海誠天之相斯文也其寒夜獨坐之作以賤子班於執事則非其類矣慚悚之甚德懋仲昭元吉樂用粹之諸公出處辱教始知其實樂用風疾近漸愈否在臯可悲有子能紹其緒否承諭移家南方足領至意但先壠宗戚所在卒難動移克修天錫充軍口北去年之赦所司具奏不准放免克修聞以易學教科舉不憂貧也欽舍田者數人嵗入不足用時或假諸人親故間類不取息用是度日不至勞心力也惟問學之功無少進益不免下愚之歸以為憂耳近悟進學之始全在收放心一事日夕勉於持敬無奈間斷不能接續舊書時復溫習覺比往時有味但精力短不能讀所未讀今年讀易本義年終可了所諭作何功夫以還造化此豈庸陋所能惟先生時賜教墨以警督之使不終歸下愚則幸甚書中别紙先生所著集要刻板否已刻幸惠寄否則希録篇首三數章寄示文耀陳憲副聞遷憲長其所刻朱子語類甚便學者是書欽曩録於京師訛舛太甚得為達之憲長賜以刻本莫大之惠此齎書金溪李客紹慶走遼東嵗以為常若得語類得附來甚便兹奉去人參一斤外參一斤書一緘奉嶺南陳白沙先生煩覔便轉致得回音留俟來年李客附來八月七日李紹慶别義州欽作此書與之今貴邑劉宣著解軍古宜歸之前夕始得見用是再敢奉瀆冀比金溪者得蚤達也聞劉宣著言南昌張先生與尊兄時有書尺往還必多論學議道之語幸録示以開茅塞簡羅一峯之子欽往年僥幸科第辱與尊翁先生同榜欽時在同年中齒卑學劣且見尊翁學富道尊但知專心承事拱聽教言而已尊翁先生以生承教之切直弟視之成化丁亥尊翁先生自北京之任南京翰林豫明年病歸遼東自是南北道逺音問疏闊矣是後又若干年始知尊翁先生亦是戊子病歸隱居湖西教授金牛洞方睹教化之行而報先生戊戌終矣𢎞治壬戌辱手書俾銘尊翁先生之墓余何敢辭所愧筆力綿弱不能發揚先生德耳往年先生寄欽書謹珍襲以藏慕德者以得先生片紙隻字為榮為私取去一紙求之屢年竟弗能得賢昆仲所收先稿有此煩録示一通使得傳示子孫永為家寶也千萬千萬所惠細葛二端本不當受但道逺難於返璧耳愧罪愧罪簡陳都憲恭聞閣下與阮方伯言屢念欽之貧窶且欽之不才卧病於家得免寒餒已為優幸區區之心惟願閣下大行斯道常如今日使東遼一方民安物阜則不才病子受賜多矣貧者士之常乞不以是挂念都指揮傅海欽表叔父也年五十有八鬢鬚斑白筋力衰憊兼以征傷發作不能任事表弟雲已出幼告乞代職未蒙賜允緣海實是衰老有疾别無他故伏望髙明特賜允許即欽之受賜也此表叔父有疾乞退用敢以白若求進者雖其人堪用欽亦豈敢言耶伏惟台照不具寄族兄弟諸兄弟在外年久拋棄骨肉於人之大倫不無有失今俱老矣幸收桑榆之功以蓋前失庶乎可耳士賢兄攜二幼子在外景瑞兄嫂白髮如銀獨與幼婦弱孫家居賀信一往兩載有餘杳無一音通弟父母俱歿未曽一拜墓所以此而言於大倫何如早早歸來已是遲晚若更延滯天地罪人矣兄弟之情不得不以告也客中多賢必有規諷兄等歸省故鄉者但不之信從耳試以此書與之論之當有以忠言促歸者不可以不從也士賢兄輩專以無路費不歸者又大不是矣莫求遂意將就可備關西路途飲食即便起程若到山海此間當遣人往接不誤也千萬至囑至囑欽去年四月二十六日喪老母五月二十日葬畢遣男士咨赴京繳敕書辭參議已蒙准辭惟所陳四事以浮泛難行寢罷此蓋忠誠未孚學術疏陋之罪也內自慚懼而已兹因杭人馬姓者回便作此奉報區區弟兄之情惟願早早歸來以遂天倫之樂伏惟心照不次寄族姪在外謹慎小心汝固能之不待多囑但更有所告汝宜諦聽自家忠孝家門為子孫者不可不謹守買賣營生固欲求利然不可利己損人有傷忠孝之家傳也汝不記憶汝祖父耶客山東若干年未嘗欺誑一人其買賣所得人誰如之後來者忠信豈能及宜乎多得財而反不及此可鑒矣賀機讀書能記一學諸生皆莫之及若自今不間久必科舉可成以此告汝使汝知積善以蔭厥嗣也勉之馬客回草此以告至囑示諸子陶侃惜分陰乃朝運百甓於齊外暮運於齊內自今觀之惜分陰勤於學也朝暮運此弗急於用之物不亦費分陰而間於學邪須知分陰當惜百甓當運不相妨費實相成就也若曰吾方汲汲科舉焚膏繼晷不敢少暇家蠱當幹者一切置之況運無用之甓邪此之惜分陰與陶之所以用心一得一失一公一私相去逺矣不可不精察而明辨之也戊戌年七月山人書簡李參戎作成人才大是美事異日成就居家而孝為國而忠大有益於君親有益於民物也方今知重此者幾何人哉生躬逢大人誠心下賢禮請名士設館育才不勝慶幸所恨賤疾不克趨慶恕罪恕罪寄韓良弼公子向嘗賦小詩奉勸賢昆仲更有二首寄令親家克明公子用勸厥子各不蒙一語之答想是迂闊之矣如何如何足下童丱時從吾逰至今不忘可謂厚矣當時論東遼諸公子表表者固非一人然皆以足下為之冠可謂賢矣以足下之賢且不忘幼日師友而有忠厚之情余豈容自外而不思有以禆益之耶世降俗薄學術之差固難正救在足下宜有以拔其流俗而亦不免余故深為之惜而不能已於言也大抵此病坐不信古道不行於今耳不信由不思不思由不疑故一切以今日已之所行為當然不必更須如古人矣試疑之曰古聖賢果可學乎人之性善皆可為堯舜其果然乎夫既知疑則必精思思之通則信矣然後知古聖賢垂訓教我後人者句句是實自然進道向前不俟督迫矣白沙先生謂疑者進道之萌芽信不誣也足下讀禮之餘試取前詩參之此語試一疑焉以驗其然否却以見告得反覆之庶彼此兩有益也若終以為迂闊不敢疑焉則非豫之所敢知矣令親家克明公子識見亦髙聞其乃郎幼而聰敏且染俗未深復之為易可告同一疑之醫閭集卷五
