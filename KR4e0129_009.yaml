body:
  text: 醫閭集卷九明賀士咨撰詩稿自警戰兢防失足頃刻莫馳心勿謂人誰見當知帝汝臨又為學不謹篤到底是空言猩猩與鸚鵡孤負昊天恩又我生幸居儒者流放心日日胡能收聖地可造由立本我田既荒安有秋適國迷途不知返作室無基良可憂年過半百尚如此轉眼光隂成白頭又聖賢典訓六經中一本流來萬不同片語未曽精著力此生不覺遂成翁始知口舌空談病難及身心實踐功莫咎回輈已遲暮勉旃直欲造崆峒偶成年老睡還少夜長醒更多土床烟火足趺坐默吟哦自警嬰兒之態終身之謀人知是務同俗是求卑汚凡近日趨下流又大人之度天下之慮天知是祈同理是顧髙明光大天衢放步答問者問余何事寄西林祗為從前枉寸隂欲識只今端的意請君細玩壁間吟和白沙韻述懷青瑣當年覔路頭幾回聨轡向圓丘别來老大渾無至愧負乾坤第一流人有以命狀呈者書一絶於後一卧雲山三十年飢餐糲飯渴清泉此生自信能知命莫把行藏更問仙讀書清晨起坐小茅堂萬事無關一炷香展卷細觀前聖奧馳名敢學世人狂也知老病年光促爭奈詩書意味長但願桑榆粗有得肯隨流俗嘆斜陽述懷壯歲辭青瑣還山坐白雲天時看代謝世事斷知聞菽水奉慈母詩書教後昆未能忘鄙陋嘗獻野人芹和鄱陽守愚丘先生韻聲利沉疴幸已瘳烟霞痼疾豈須憂非關遁世矜高節自是匡時乏逺猷瑣闥兩年空竊祿雲山十載免包羞管寧本是遼東客不願重過五鳯樓寄大尹邵文明長官辭縣賦歸來獨愛幽花手自栽何日一樽同笑傲東籬飽看帶霜開古澄丁聲遠來訪賦一律見遺因和答二首太學陳東天下知抗章不怕忤當時折腰彭澤成何事回首閭山有所思軒外孤松全晚節宅邊五栁散春絲歸來還是忘機客傳語沙鷗莫浪疑又曽見多人說舊知幾人能保歲寒時感君千里來相訪慰我終年病裏思元伯歡呼具雞黍子期靜聽鼓桐絲連床幾夜知心話講破羣經多少疑答同年大司成林亨大只今惟有大司成歲晚能全故舊情猶怪書來無警戒索居多過賴誰更挽同年羅一峯二十年前同及第數千里外嘆離羣誰知竟作終天訣空對丹青泣暮雲戲贈友人張解州平生少陵詩先生嗜之極方其得意時寧知有六籍吟哦固所愛句語肯輕擲未合此格調終年不下筆章成持示人蒼古多弗識朋儕無賞音撫簡自嘆息懲此謝詩壇酒量空無敵我言揚子雲太𤣥終不匿今晦後應顯勸君無固必答守關陳司馬諒之碌碌行藏兩鬢星甘心待盡水邊亭匡時有志迂何補學道無聞醉未醒鄙陋敢知符夢寐高明誤許見儀刑眼中好德陳司馬山海茫茫雲樹青蕭文明書寄光風大字有作故人手寫光風字逺託征鴻寄草堂鐵畫銀鈎且休論高情雅意可能當又珍重遼西海釣翁閒揮大筆對光風書成不寄青雲客却憶平生賀克恭寄邵文明大尹鄉書曽得共推賢金榜題名子更先大尹有才還解組瑣闈無補早歸田利名風浪都無與泉石膏肓兩不偏同在故園不相見閭山遼水思悽然傅彥明昆仲久客維揚詩以寄之山人寄語三公子便買歸舟莫更留南國可知春似錦髙堂無奈雪盈頭黃金滿載皆由命白手還家豈足羞兄弟師生分非淺詩成四韻淚雙流伯初過訪留飲賦詩退士卧聽傳呼聲驚起倒屣門前迎故人久别喜會面賦詩酌酒心相傾寄邵大尹有跋長官愛菊邁常情有甚東籬嗅落英祗恐偷兒窺絶品不教放蕊只觀莖又昔聞陶令無絃琴今見邵公不花菊得趣豈在聲色間異代長官同一律逹孟卿揮使為余言母舅邵先生愛菊特甚有名品數種東土所無嘗為好事者遣僮竊去其幸存者自後每當發蕊輒掐去之不令放花時時撫玩其莖以自適耳余聞賦此奉寄因憶古有無弦之琴今有不花之菊復成一絶併以録呈他日面晤尚當叩問菊之真趣如何也次余柱史與石翁先生倡和詩韻白沙老子仙逰逺青簡遺音塵夢多江海百年鍾間氣乾坤萬古潤餘波龍潛稍見黃金闕鳳去空餘翠竹窠西港可人今柱史此心元不隔關河與友人宴小莊瑣闥無堪早退藏衰年幸得病軀康分曹校射依芳樹對景開樽樂小莊休言席上杯盤惡且喜壺中日月長况是吾人俱白首更憂何事不徜徉贈友人何人過我釣魚亭四十餘年故舊情羡子一章豺虎息明時幾度鳯凰鳴寸心燁燁昭千古萬目明明看此行多少疲癃望蘇息莫因聲利負平生人有求薦舉者題其書後半生榮辱斷知聞逺處茅堂伴白雲何事利名場裏客却將書札撓幽人俗不讀小學以科舉不用故爾詩以紀之紫陽小學人誰讀祭酒居然教不行念念只歸官祿上謾言父母與神明哭張東海東溟居士金蘭契筆底龍蛇滿我家病裏一聞乘化去舉頭觸目淚橫斜贈逹揮使顧公雅操堅氷檗邵令辭官掇菊英怪底君侯美如玉顧門髙弟邵家甥和韻喜陳本仁相訪昔時與子共談經情分相投北斗城别我十年身已逹聽君一律句尤清幽居忽訝髙軒過多病深慚倒屣迎况遇故人丁大尹連牀同與話平生再和鄱陽守愚丘先生韻白雲堆裏得安身名利無干逺世塵靜把簡編窺往哲每將菽水奉慈親江山秀麗詩懷壯窗户清幽瑟調新幸有此般閒快樂任他人醉五陵春偶成淩之滸兮一竿竹水洋洋兮山矗矗青瑣歸來三十秋閒雲野鳥相追逐日長午困憩茅軒聲利無關心自足終身得此復何求况是書香兒已續和答董桂岩同年謝病歸來已十霜閒中養就野夫狂每尋瑶草和成藥自剪青荷製作裳幾曲枯桐秋月白一竿修竹暮烟蒼鏡湖原是吾家水還擬扁舟泛渺茫又仙崖老桂凜風霜嫩栁夭桃敢放狂十載長懷人似玉幾時再與子同裳青山遁迹心常泰黃閣憂時鬢易蒼日邁月征隨所遇肯教大道草茫茫偶成借白沙先生韻柬丁大尹行藏自昔貴因時莫使傍人更起疑𤣥聖春秋非我事先天圖畫是心期放言不論人長短考古惟求道盛衰幸有簞瓢能免死何妨隨分老耘耔簡鄉親攜壺欲就名園賞借問如今春淺深但得紅芳飛未盡便來枝下聽鳴禽題看山圖問爾看山人山中坐幾春定知方寸裏無處著纎塵溪上茅亭和士咨釣臺髙處小茅堂退士登臨歲月長假寐不為黃閣夢無營還笑白雲忙清風明月何須買緑水青山自可常三十年來無外事此心贏得不炎凉述事忽忽光隂六十餘年來猶自惜居諸茅軒鎮日無塵事一炷清香一卷書題扇上釣魚圖江上釣魚翁不識家何處我恨淩溪未得朋安得與君同去住又倚杖看閭山垂綸釣淩水山頭宿霧開水面清風起題畫雲湧青山動橋橫碧澗斜幽人無俗事拄杖去看花墨室銘墨宜黑不可白粉宜白不可黑粉而白墨而黑物之則墨而白粉而黑反而忒人而靈豈無則人而忒斯大惑題畫猫軀如雪兮尾如墨兮雙目如炬勢雄傑兮主家鼠輩羣唧唧兮匪特夜逰閙白日兮汝獨何為弗搏擊兮華飾以戲空竊食兮空竊食兮曽不思其職兮題扇畫月下兮松間清琴兮罷彈倚松兮看月何塵俗兮能干題晚菊豈必滿頭方足樂略教經眼便堪竒如何不對重陽酒寂寞經旬見此枝釣淩溪晚凉匹騎出垂釣城西隅蚯蚓費且盡魴鯉秪自如時或得其稚輕重不盈銖浩歌指歸路得意豈在魚簡鄉人從來退士偏憐菊見說君家品最竒欲挈一壺來就賞不知何日是開時題畫蓮因循六十年未得成君子花神如有知還應為人恥魚磯偶成何人笑我上魚磯本是窮荒一竹枝縱然有節中無物怪底長江舉釣絲題萬佛堂壁峭壁鑱成萬佛身招提開創幾千春行童不識尋幽客誤作恭禪問法人又雲端石洞可棲身水繞山圍賸得春傳語髙僧休厭客西林曽寓著書人擬寄鄊人萬里慈親命已傾天涯逰子更南征也知雁使飛難到豈有烏雛負所生吟身莫戀風光好歸棹須兼晝夜行若向西湖聽杜宇聲聲都是勸君情題退休卷五十年來早退休三邊賢逹子為頭題詩每上春山寺載酒頻登夜月樓釣艇有時江上泛兵書盡日篋中收常憐李廣非知命抵死何曾到列侯題華山髙卧圖賡丁聲逺之作太華峯頭經月睡洞庭湖外貼天飛欲知動靜元無二試問遼東丁令威賞花有跋落盡羣芳枝已空逰人往往怨東風誰知寂寞幽園裏猶有楸花一樹紅三月十九日史三親家置酒園舍以賞春芳花落枝空且有後時之嘆傳杯既久起而較射散步鄰園忽見楸花一樹紅白可愛同逰盡歡抵暮乃已因有此作山人識先生坐水亭三伏不知暑多少熱中人安得此閒處右水亭凉處橋下寒塘淨橋邊風物清倚䦨閒得句不入俗人情右小橋吟處種得四時花終年香不絶有暇輒開樽何必逢佳節右花圃香處髙樓時一上眼界豁無涯望入遼天去悽然有所思右晴樓眺處醫閭集卷九
