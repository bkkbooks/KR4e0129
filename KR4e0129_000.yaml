body:
  text: 醫閭集别集類五明提要臣等謹案醫閭集九卷明賀士咨編輯其父賀欽平生言行及詩文稿而成欽字克恭其先浙之定海人以戎籍𨽻遼東義州衛欽登成化丙戌進士授户科給事中謝病歸𢎞治初起陜西參議檄未至而母歿乃上疏懇辭服闋遂不復出事蹟具明史儒林傳是書前三卷為言行録四卷至七卷為存稿皆雜文第八卷為奏稿第九卷為詩稿欽官給事時聞陳獻章名遂師事之及謝病歸里杜門不出惟以進修為事其學不務博涉専讀經書小學期於返身實踐嘗言為學不在求之髙逺在主敬以收放心而已故集中所録言行皆切近真實非髙談性命者可比而所上諸奏疏亦無不通達治理確然可見諸施行獻章之學當時或病其近禪欽雖學於獻章而性情篤實循循下學平日論工夫次第亦往往指獻章議論為過髙其氣象殊不相似在講學諸人中粹然獨為純正文章雖多信筆揮灑而仁義之言藹然可見固不必以工拙論之也欽少讀書醫無閭山自號醫閭山人並以名其集云乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6adaaacff3d9e1147cb8d8afde93e1adc20074bbd16041b07108dbc37206e7b4
