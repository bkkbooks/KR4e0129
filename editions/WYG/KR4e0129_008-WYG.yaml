body:
  text: 醫閭集巻八明賀士諮撰奏稿應天以實䟽户科給事中臣賀欽謹題為應天以實事臣切見連年以來災異之作畧無虚歳而今年為尤甚自春抵夏或風霾屢日或黄霧障天或狂風怒吼或日月無光始則恒隂而少晴明旣則久旱而無雷雨隂陽失序氣候舛差天之降災莫甚於此得非人事不脩之所致歟昔董仲舒對漢武帝言國家將有失道之敗天乃先出災害以譴告之者此之謂也於此見天心眷佑我國家仁愛我皇上欲其恐懼修省以享治安於億萬年也頃者禮部尚書姚夔等具陳災變之狀乞修内外之政綸音奬其忠愛且曰内事朕自處置外事便斟酌行此陛下一念應天之實心也是以命下之日隂曀頓然而晴明旣而以久旱為懼躬率羣臣齋戒三日以答天譴此又陛下一念應天之實心也是以命下次日微雨應期而即降天人感應一何速耶然而自是以來風霾旣息而復作旱勢日甚而可憂所以然者豈陛下應天之實心謹於前而怠於後耶抑羣臣無應天之實心以助陛下之格天耶不然何前日感應之易而今日感應之難也詩云敬天之怒無敢戲豫敬天之渝無敢馳驅言人君不可不致謹於天變也以今日言之天之怒而變也甚矣而陛下方且逰樂是從呐喊動地鼔砲震天其為戱豫馳驅何以加之而所謂應天之實心果安在也詩又云天之方難無然憲憲天之方蹶無然泄泄言人臣不可不致謹於天變也以今日觀之天之難而蹶也甚矣而在廷大臣以及羣僚方且怡然自得恬不知憂惟務承順懼忤聖情陛下以為可行彼亦曰可行陛下以為不可彼亦曰不可習成諾諾之風全無諤諤之節其憲憲泄泄何以加之而所謂應天之實心以助君而格天者又何在也若然則今日感應之難非天道之難感固感之之心有未實故耳伏望陛下念天變之可畏憂民命之將絶痛懲前日旣徃之失渙頒省躬求言之詔篤格天之實心修格天之實徳行格天之實政遊宴之樂非所以克謹天戒也必實絶之而不敢為無名之賞乃所以暴殄天物也必實止之而不妄費内事之處置所以正天倫繁本支也必實謹其分而溥恩澤之施經筵之講學所以明天理窮道義也必實究其㫖而求貫通之妙君臣上下之情不通則天地之否也必日御便殿延接羣臣反覆治道而貫以通之君子或在野則天民之隠而當進也小人或在位則天事之蠧而當去也必叅之於衆驗之於獨實以進之實以去之以至一政令云為之際一出入起居之㣲無不實循乎天則之自然而無或違焉如是而復下詔以切責乎文武羣臣斥其怠事廢職之罪開其悔過自新之途使各痛以自省而陳其旣徃之失勇以自改而勉乎將來之善務盡其實不事虚文其或過而不改善焉不勉鰥官曠職妨賢病國者罷而黜之以勵其餘如是則君臣上下同一應天之實心矣以是實心而齋戒以致禱則必如成湯之禱於桑林而大雨數千里必如周宣之靡神不舉而轉災以為祥天心有不豫天道有不順天災有不息天澤有不降者臣之未信也臣猥以庸愚備員言責不能進盡忠言以禆朝政論列邪佞以除國蠧致兹災咎罪不勝誅夙夜憂惶無所容措若於此而復緘黙不言則將來災禍必不止於此雖萬死不足以贖尸曠之罪矣因敢不避忌諱昧死冒陳伏惟聖明察納而躬行之則天下萬世不勝大幸縁係陳言弭災事理未敢擅便謹題請㫖自劾䟽户科等給事中臣賀欽等謹題為自劾事臣等切覩邇來災害疉作歴時不息乃敢各罄愚忠繆陳已見乞詔文武羣臣同加修省等因節該奉聖㫖言路未甞沮塞修省的事未甞敢慢朝廷凡事都從減省了君臣上下還要同加警戒以回天意欽此臣切惟自昔上天垂戒未有君臣能加修省而災害不弭者也今自春徂夏而天意不回者臣等有以知其故矣盖今所謂修省惟陛下一人耳其餘大小諸臣起居自若恬不知畏其間寢食不安憂形於色以社稷生靈為念者幾何人哉如臣等猥以微陋濫居言路平時緘黙取容上無所補下無所濟徒爾尸餐以致災害荐臻曠職之罪無所逭矣雖皇上量同天地不加譴黜而臣等律以大義實難自容若尚戀禄偷安阻塞言路則罪益大矣伏願皇上體上天垂戒之心俯從所請將臣等即日放歸田里庶幾在位諸臣知所警懼修改以回天意是臣等庸繆始於冒進雖無補於明時終於勇退尚少愧於流俗縁係言官曠職自劾乞退事理未敢擅便謹題請㫖辭職陳言䟽户科養病丁憂給事中臣賀欽謹奏為辭職陳言事臣係遼東都司廣寧後屯衛籍由衛學武生應景泰七年山東布政司鄉試中式成化二年中進士成化三年二月選户科給事中在任辦事至成化四年五月亢旱為災臣與本科給事中胡智兵科給事中董旻等三人自以濫居言路曠職召災具奏自劾願乞放歸田里庶使在位諸臣知所警懼修改以回天意特蒙先帝聖恩不准退歸本年六月臣以弗能謹疾得患風濕等病調理三月未得痊可照例住俸陳乞養病蒙吏部題准回衛以是年十二月抵家於今二十有餘年矣調理病軀奉養老母中間疾病有間供養有暇則指引後進之蒙士勉以為己之正學幸成良材得為世用亦㣲臣圖報之萬分也臣終身志願不踰於此兹遇皇帝陛下丕紹洪基光臨大寳一心清明庶政修舉内閣大臣承順徳意薦舉人材臣之愚戅誤居首列蒙恩授陜西布政司右叅議撫治商洛等處提督官軍民壯兼分守漢中府地方四月十六日吏部發下文慿一道令臣依限赴任臣中心惶懼莫知所措盖臣早蒙國家造就之恩得從言官之後不能推明所學以道事君臣罪多矣病歸養親二十餘載方安愚分甘老田園乃今復遇陛下收録先朝舊臣不次超擢就使髙蹈逺引之士處此亦當出為世用况臣素懐犬馬報効之心者耶但當是時臣之舊疾未能全愈况兼臣母郭氏年八十有六自二月初五日以來病卧在床日漸危篤臣實孤子無他兄弟方欲具本陳情辭職乞恩終養而老母以四月二十六日病故矣殁方浹晨而敕諭下臨收涕易服出迎拜受感激悲愴莫能為心縁臣當日在科歴俸不過年半計年較勞殊為淺薄驟陞方面義實難安敢瀝悃誠冒干天聽伏乞聖慈收還新降叅議恩命使臣仍以舊職養病守制他日終䘮幸而疾愈敢忘天地之恩而不圖犬馬之報耶雖然聖主難逢病軀難保誠恐一旦身先朝露則報恩之言徒成虛語九原之下能瞑目乎是臣身固不可冒禮以進而言則不可不及時而進也安敢拘拘守居䘮不言之禮節而黙黙以失千載難逢之機會也耶伏惟陛下初政納諫多所舉行臣今不敢毛舉細故重煩聖聽謹擇取今日至切至要至重至大諸臣所未言與言之有未盡者四事昧死為陛下陳之一曰資真儒以講聖學臣伏謂人君之治天下欲求四海之治當盡為君之道欲盡為君之道當講聖王之學聖王之學何學也所謂大學者是也明明徳新民止於至善其綱也格物致知誠意正心脩身齊家治國平天下其目也唐虞三代所以治隆於上俗美於下者由人君之得此學也漢唐以下所以治不古若壊亂相仍者由人君不得此學也何則得其學則君道盡不得其學則君道乖此治亂所由以分也是大學也經作於孔子傳出於曽氏程子表章而發明之朱子序次而補註之西山真氏又從而推衍其義實以經史無不備焉載之䇿簡昭然明白固無俟於後人之贅言而亦陛下已甞講讀之書矣臣今復舉以為言者非不知陛下甞講讀之盖區區愛君之誠惟願陛下不泥於世儒口耳詞章之習不惑於鄙夫古道難行之言不徒講明之而實信之深不徒深信之而實行之篤循其分明之節目進其有序之工夫則大學明徳新民止於至善之道不在方册而在陛下矣夫如是君道豈有不盡天下豈有不治哉是則今日急務莫先於講學而經筵勸講之官所謂師友之臣尤當訪求真儒以充其任不宜茍以俗儒厠其間也所謂真儒者學以為己知而能行不事空言者也所謂俗儒者學以為人徒知而不行惟務口耳詞章之習者也伏惟陛下畱神致察今日經筵勸講之臣其為真儒耶抑為俗儒耶果真儒也必能積誠感君開導有方涵養聖質薫陶聖性開發聰明進徳脩業何憂聖學之不得君道之不盡哉果俗儒也亦徒備勸講之虚文無格君之實徳其不阿徇逢迎讒謟面諛亦足矣尚何望其有補聖學之萬分哉是則聖學之成與不成君道之盡與不盡天下之治與不治一繫於經筵講官者如此則陛下今日於真儒俗儒之辨其可以不明而進退取舎之際其可以少差哉伏惟陛下大施明斷天下幸甚二曰薦賢才以輔治道臣聞帝王之為治莫急於求賢人臣之忠君莫重於薦賢伏惟陛下即位之初詔求賢才以弼治化此可見陛下有願治之盛心得致治之要道孔子曰舉爾所知爾所不知人其􅃕諸臣敢不以臣所知者為陛下薦之臣先年在科之日接見廣東新會縣歴事監生陳獻章天性髙明學術純正非記誦辭章之流實躬行心得之士有格君之徳有經世之才是誠當代之大賢宜為士夫之矜式臣在京師接人多矣未見有出其右者也成化十五年以來廣東左布政使彭韶欽差總督兩廣軍務兼理巡撫右都御史朱英前後具本薦其才賢吏部移文所司以禮起送成化十九年三月到京朝見以身病母老陳乞終養蒙朝廷授以翰林檢討令其親終疾愈仍來供職迄今六載不知陳獻章前疾已愈母養已終與否伏望陛下以非常之禮起此非常之賢召之便殿問以治平之大道以觀其謀猷授以政事以試其才識若其賢果如臣言伏望陛下或任之内閣使叅大政或任之經筵使養君德臣敢謂不三數年而太平之治可必致也縁陳獻章作止語黙絲毫不茍而世之樂放縱惡拘檢者多嫉之陳獻章以知而必行為正學而世之務口耳尚詞章者多嫉之陳獻章安於退處不求聞達而世之貪利禄好奔競者多嫉之惟陛下察納臣言不為鄙夫俗儒之所遷惑斷自宸衷而决行之則天下幸甚使或陳獻章身病未愈母養未終果不能出亦望陛下虚已受人使之詳陳其格君善俗之道興利除害之方陛下深信而舉行之是獻章身雖家居而其道則行於朝廷矣况陳獻章旣賢其所知必有才良行脩曉逹治體者陛下令其一一舉之以充國用豈不足以賛襄道化而致隆平哉大抵賢才之生無代無之惟在人君訪求任用之何如耳茍求之以其方待之以其道則聖賢之才亦將出為世用矣何患天下之不治哉臣更乞陛下再諭内外大小羣臣悉心推訪各舉所知果才徳學行殊常之賢或山林隱逸或庠序生徒或小官下職一皆以禮敦遣萃於京師依明道程子養賢之法置為延英之院以處之豐其廪餼䘏其貧乏以大臣之賢者典領其事止以應詔命名不遽進之以職凡有朝政典禮使之討訂使凡執政近侍之臣互與講論如學政則討論程明道之論學校程伊川之看詳學制如貢舉則討論朱文公之貢舉私議如經筵則討論程伊川之經筵奏劄必使今日之學政今日之貢舉今日之經筵一如程朱至當之定論以革近世浮華淺陋之習若然則與陛下近日納太學生之言行文公家禮於天下以革浮屠千百年之積弊豈不同一痛快人心也耶其有益於朝廷宗社有益於天下後世豈不大且逺耶况此諸賢切磨日久徳業益進陛下特賜召對以觀其才識器能則屢歳之間人品益分然後就其高下大小而任使之則天下賢才引類而進陛下徳政之美雍熈之治端可比隆唐虞三代矣伏惟陛下察納而决行之則天下幸甚三曰遵祖訓以處内官臣聞自古帝王之治天下内則公卿大夫外有州牧侯伯一皆遴選賢才弼成治道若内官之設載之周禮曰内小臣曰閽人曰寺人曰内豎紀其職掌不過正内人之禮事守王宫中門之禁掌女官之戒令與内外之通令而已未聞任用奄寺於中朝外方使之典政本而掌兵權者也此堯舜三代之治所以雍熈泰和而非後世之所及者歟降及秦漢而下先王道廢時君失政奄宦小人投隙而進􅀼弄國柄傾危社稷自趙髙亡秦以來宦官之禍無代無之如漢之𢎞㳟石顯單超侯覽唐之程元振魚朝恩仇士良李輔國宋之童貫梁師成輩載在史册不暇悉數㳟惟我太祖高皇帝洞鑒前代之失創為萬世之法内設五府六部都察院通政司大理寺六科十三道外設都司布政司按察司府州縣等衙門分理天下庶務其内府監司局庫衙門之設載之御制皇明祖訓内官之條紀其職掌亦不過洒掃供養并飲食諸物禮儀筵宴關防出入等事而已亦未有干預朝政職掌兵權之制也其創制立法之善蓋與古昔帝王同條共貫宜為聖子神孫萬世不易之法奈何後來守法少踈宦官倖進内而職掌天下奏牘得預大政外而鎮守各處地方掌握兵權遂致内外交搆黨與衆多作威作福盗􅀼政柄納賂招權賣官鬻獄文官武將多出其門氣燄薫灼傾動朝野引用姦邪排擯忠直以致士風頽靡國體虧傷社稷傾危蒼生􅂗炭臣不敢逺舉只以耳目所及近年害政尤甚者言之正統間則有王振喜寜景泰間則有舒良王誠天順間則有吉祥牛玉成化間則又有汪直尚銘梁芳陳喜之輩焉凡此之輩方其得志之時正漢史所謂迹因公正恩固主心中外服從上下屏氣舉動回山海呼吸變霜露阿㫖曲求則光寵三族直情忤意則禍不旋踵是以或䧟主敵廷身叛邊境或主易儲君禁錮南内或謀為不軌賄易后妃或邀功起釁流毒邊徼或恃寵招權納賂不貲或引用左道蠱惑上心或導進淫巧盜虚府藏此其䧟君誤國蠧政殃民昭昭在人耳目者也是致國本頻揺而復定宗社屢危而更安非祖宗在天之靈上天保佑之至必有臣子所不忍言者矣兹者恭遇皇帝陛下逺遵帝王之制近守皇祖之規莅政之初百度惟正進賢退姦去讒逺佞奄宦之害政者屏斥流放不使在側於以見皇上真大有為之主也泰和之治指日可期天下臣民罔不欣忭雖然臣於是猶有憂焉何則臣恐祖制未盡復病根未盡去一旦發作復如故矣伏望陛下深鍳已徃之弊永絶方來之禍渙發綸音昭示中外凡今大小内官一遵太祖髙皇帝祖訓凡分職監司局庫諸門者各照註脩其職掌不許分毫干預朝政一應在外鎮守監鎗等項盡數取回赴京蓋旣曰内官但應處内而乃布之四外名實不正莫此為甚殊非帝王之制皇祖之訓決當速改無可疑也若謂在厰訪事内官可以發官吏之姦􅂍各邊鎮守内官可以防邉將之姦宄此又不思之甚者也夫自古聖帝明王明四目達四聰使天下臣民皆得進諌中外之情毫髪不蔽姦􅂍官吏自不能容庶政惟和兆民允殖曷甞以訪察之權假之奄宦使之作威作福以害家凶國耶況其假公正之迹遂姦慝之私所訪察之姦􅂍常小而自作之姦􅂍常大所訪察之姦􅂍雖袪除於目前而所自作之姦􅂍實遺禍於久逺偏聽生姦獨任成亂成化年間汪直之輩可以鑒矣各邉將官旣有巡撫之都御史又有巡按之御史凡有姦宄足以關防矣今乃處處設立内官果何益乎徒使蠧壞兵政殘虐軍民將官之賢而知兵者為其拘制當進而不得進當止而不得止徃徃有䘮敗之患將官之庸愚姦貪者則以賄賂相交結成私黨肆為姦惡愈無忌憚蓋鎮守將官旣賂鎮守内官而鎮守内官則常以良馬金寳賂其在朝擅權之黨類一有言將官之不職者則主上左右前後之人誰不為其斡旋其根愈堅其惡愈肆害擾黎庶不得安生刻剥官軍苦無所訴甚至隱匿邊機妄報邊功以有為無以虚為實欺誑朝廷致誤刑賞而莫有為陛下言者畏宦官之勢重故耳使各邊無此内官其為將官者何所倚仗而敢如此乎縱或有之亦不待如此其甚而巡撫巡按之官已言於陛下而罰之矣寜致九重之上壅閉而不得聞乎是則各邊内官欲以防姦而顧為姦宄之地陛下猶可以為心腹而倚任之乎大抵内官類多邪惡雖千百之中有一二忠謹者然亦不可使之犯分以干軍國之政譬之婦人雖賢不可主外事若國使婦人預政家使婦人幹蠱牝雞鳴晨之禍不旋踵而至矣内官婦人實同一理惟陛下遵祖宗之制而一一革之則天下臣民有不歡忻鼓舞而歌詠聖徳者臣請甘妄言之罪自後一應人等敢有奏請内官預干軍國政事者即是姦黨伏乞皇上立法定罪明著簡册以示天下後世則姦謀永絶矣必如是然後為能近守皇祖之規不少違逺遵帝王之法無或悖大中至正而盡天理之極至善全美而無毫髮之私不惟增光祖宗實可匹休帝王由是禍本永絶士氣永振言路永開賢才永進黎庶永安邦基永固世運永泰為我國家聖予神孫萬萬年無疆之福不其盛哉自昔宦官擅權敗國身家亦隨之今處之有道使之各安其分保其秩禄享其富貴永無殺身亡家絶宗赤族之禍是則非惟我國家無疆之福亦自今宦官無疆之福矣臣之此言上合天理下順人心逺不悖於帝王之道近不違於祖宗之法陛下於午朝聽政之際試出臣章以示在廷羣臣并請太祖髙皇帝御製皇明祖訓使近侍之臣宣讀講解則凡不私結内官而忠於陛下者必皆以臣言為是而欲陛下速舉而行之也其或以臣言為妄者則是以天理不必合人心不必順帝王之道不可遵祖宗之法不可守其為内官之黨陛下可以黙識矣若内官之中邪妄者固不可與言而平素忠義果有如呂强張承業者陛下亦以臣章問之則亦必不阿其黨以臣言為是而欲陛下成此大有為之聖政矣惟陛下體乾剛健斷然行之天下幸甚萬世幸甚四曰興禮樂以化天下臣聞帝王之為治必以正風俗為先風俗善則人為善易而為惡難風俗不善則人為善難而為惡易是風俗之善與不善實天下治亂之所由係也經云安上治民莫善於禮移風易俗莫善於樂二帝三王治隆俗美臻於泰和者由禮樂之得其正而天下為一也後世之治化陵夷風俗壞亂者由禮樂之失其正而紛亂無統也然則禮樂之敎其正風俗之至切至要者乎洪惟我太祖髙皇帝當治定功成之時制禮作樂固極其盛矣然由粗以入精因畧以致詳不能不有待於後聖也昔文王以大聖之徳百年而崩必待武王周公繼之而後敎化洽於天下此亦理勢之自然也肆我皇上丕紹洪基之初逹聰明目聽納忠言罷黜浮屠妄誕之邪術舉行朱子䘮葬之正理真所謂守成業而致盛治之聖主也但初政之施方發其端而未極其備故頽敗之俗尚多仍其舊而未極其新且如異端邪術雖曰罷黜而僧道寺觀充塞朝野者無異徃時妖經邪說惑世誣民者尚如昨日病根未拔日當滋長矣䘮葬正禮雖曰舉行而有司奉行者徃徃不體聖心故奢豪不律者尚多故違國法幡幢之制僭擬朝廷奠禮之奢十倍諭祭或飲酒食肉竊作佛事或乘䘮嫁娶明用鼓樂若此之類不能枚舉是皆頽敗之俗因循而未革者也他若冠婚祭祀諸禮有祖法之所當申明者有家禮之所當舉行者今未見一一行之以教化天下而習俗之弊則日新月盛子猶飲乳已加巾帽而昧夫童子之禮及其旣長終於愚騃而不知成人之道夫少不脩童子之禮長不知成人之道則不忠不孝靡所不至此冠禮不行之弊也聘娶之禮以庶民而上比公卿論財之風以好合而直同商賈夫以僣越之心狥財利之誘則凡竊奪之事力可及者何所不為此則婚禮不行之弊也至若祀禮不脩故雖縉紳之家莫不狥俗茍簡况於庶民小子豈知尊祖敬宗故為木主者少而懸紙㡠以標題者多以禮祭者少而招師巫以惑亂者衆至若祀邪神於家禱􅁋祀於外棄父母之孝養舍當務之人倫者尤不可勝數此皆朝廷祀禮不脩故無以定民心而一民俗也臣請以􅁋祀之當毁者試陳其一二而陛下擇焉如五嶽四瀆五鎮等神我太祖髙皇帝深知鬼神之情脗合聖賢之道悉去前代封號之妄誕而仍復各神之本名一洗千載之陋弊永為萬世之成規奈何後來雖明詔昭然而陋弊復作如東嶽泰山之神但謂泰山之靈耳初非人鬼也春秋祭祀祗宜設壇立主以祀之豈可建為廟宇塑為形貌而仍用祖宗已革妄誕之號乎且又别為廟宇塑為夫妻不知又以何山為之配也豈非妄誕中之妄誕者乎昔季氏以大夫而祭之孔子尚議其僭竊何乃今之庶民小子賊盜娼􅁋皆得僭越謟瀆而汚穢之乎魯地如斯已為非禮况如遼東相去二千餘里亦為廟貌祀之名曰東嶽行祠夫山為至靜之物其神安有巡行之理且又塑為十代閻羅之形剉燒舂磨之狀以惑亂萬姓展轉妄誕一至於此又如關公之廟祗宜建于生長之方有功之處豈宜遍祀於天下若以為關公平生忠義可為世法則古之忠臣義士較功度徳而逺過公者多矣何獨於公乃宜如此哉又如真武本為𤣥武宋時避諱改為今名𤣥武為龜蛇北方虛危星宿之形似之故因而名之今各處立為廟宇塑為人形别作龜蛇名為二將凡此等惑世誣民理當拆毁之􅁋祠普天之下不知幾千萬數此蚩蚩小民所以棄祖先之享祀而求媚野鬼邪神廢父母之孝養而從事符章巫覡踵訛承誤習以成風欲民俗之善得乎若夫士子無廉恥之節官吏多奔競之風商賈日志於奢華工藝日趨於詐偽此又朝廷禮讓之化未行也囘囘降人之類久處中國者尚多不遵王化固守土風道友師巫之流詭於正道者率皆聚徒傳法惑亂黎庶此又朝廷禮法之未一也禮廢之弊如此其多樂廢之弊尤為不少自朝廷之樂言之用於郊廟之類固皆太常寺之雅樂而古淡和平無可議者至若敎坊司之樂其聲容節奏已非雅樂之比而司其事者皆無愧恥失人倫􅁋邪鄙陋之徒堯舜三代之典樂者果用如此之人乎以如是之人作如是之樂用之於朝廷之上宴享之間其惑上心辱朝廷亦已甚矣尚望感人心之和易四海之俗而成唐虞三代之治耶况其院本雜劇之類率多􅁋邪戲慢之為所謂代變新聲妖􅁋愁怨導欲増悲者也豈非蕩人心壞風俗之尤者乎是皆唐宋至元以來因循未革之宿弊也夫以朝廷之上根本之地而所以為天下先者如此以故􅁋邪之聲不正之樂海内成風莫覺其失甚至髙建戲臺歛錢作戲致使城中少長聚觀男女雜處虚費民財壞亂民俗所在官司畧不禁止是豈聖朝之美政耶乂如京師及各處娼樂其流蕩人心壞亂風俗比之上所言之俗樂不啻百倍不識聖朝蓄此果安用哉如郊祀神祇此􅁋穢之樂不可用也廟享祖考此􅁋穢之樂不可用也朝廷宴享此􅁋穢之樂不可用也諸侯用之足以䘮其國大夫用之足以䘮其家士庶人用之足以䘮其身是上自郊廟下至庶人皆不可用也不識聖朝蓄此果安用哉且京師為首善之地萬化之原萬姓之所取則四方之所觀瞻必標凖立敎化行天下臣民一觀國光勃然興起若虞芮朝周而爭田之訟自息可也豈可設為三院以蓄􅁋穢之物而為天下之䧟阱耶况此等娼媱所服者莫非錦繡之衣所用者莫非金寳之器􅁋邪之聲響徹街衢妖艶之色照耀道路故雖文武官員庠序士子亦徃徃墮此䧟阱之中况膏粱之子弟經營之商賈游食之惰民一睹此物隨風而靡廉恥旣無資財耗盡上不顧父母下不䘏妻子柔弱者至於漂流乞食死於道路剛強者至於刼財殺人不畏國法禍本不除積習旣久後來之禍可勝言哉且天子以四海為家海内之民皆為赤子如養民則不可使一夫不獲其所如敎民則不可使一民不全其倫凡此娼優同為陛下之赤子也奈何以禽獸畜之使其子子孫孫永䧟聚麀之惡而畧不傷憫之乎恭惟陛下負不世出之資為大有為之主奮然以唐虞三代之敎化為必可行以今日之極弊為必可革不為因循駁雜之政所牽制不為鄙夫俗吏之言所遷惑於凡臣所言冠昏䘮祭之禮􅁋聲妖色之害與凡臣言之所未及或言之有未盡者其詳載於大學衍義及御製性理大全等書乞命經筵講官一一詳說使邪正之辨利害之分聖心洞然一毫不惑由是於祖法之所當申明者嚴令以申明之家禮之所當舉行者詳悉以舉行之異端邪術必㧞去病根而不為姑息之舉􅁋邪祠廟必查審拆毁而不為因循之政禮讓之化未行者必崇尚徳敎而使之行禮法之未一者必嚴其政令而使之一凡今俗弊一一痛革則上自朝廷下逹四海莫非太中至正之禮矣若夫敎坊司之樂有未善者則求知鐘律之人而改作之院本雜劇决可革者則著為定法而永革之典樂􅁋邪之人或號令之使改行而從善或更易之使散處以為民京師及各處娼􅁋原無夫者則盡令嫁主從良原有夫者則不許仍前􅁋亂使其務紡織以謀衣食習亷恥以全人理則􅁋穢消除化為良善矣公卿以下祭祀宴飲之類朝廷舊無頒降之正樂故人皆䧟於世俗之􅁋邪今當次第制之以化天下而於不正之􅁋樂一一革之則上自朝廷下逹四海莫非盡善全美之樂矣夫正禮雅樂自天子出如此則國不異政家不殊俗而風俗自美風俗旣美則民心自善民心旣善則天下之治可與唐虞三代並美矣何有不序不和杌隉之憂哉若有謂世俗之弊積習旣久祖宗以來莫之有改今不可遽然革之則是因循茍且之論而非善繼善述之孝也竊譬之治田畝者厥祖父載芟載柞而未竟畝養材木者厥祖父誤舍梧檟而養樲棘為之子孫者終其餘畝易其樲棘而為繼述之孝耶抑但因循其舊而可以謂之孝耶此事理較然明著無可疑者若必以承誤踵訛為孝則陛下於前日傳奉之官不必革左道之徒不必問進寳玩者不必罰宦官之蠧政者不必屏斥而言官之黜謫者不必收録矣豈禮也哉由是言之則凡當今之弊一一革之為是而因循不革者未為是也革之為孝而因循不革者未為孝也伏望陛下自斷宸衷而决行之則天下幸甚萬世幸甚臣伏謂六科給事中朝廷近侍言官也臣竊此職名回衛養病未䝉褫奪雖曰家居猶是官也時不可言不言可矣可言不言如負職何然則於今不言不惟負此言職而實負我英明大有為之聖主矣不忠之罪孰有大焉臣雖至愚讀書為士君臣大倫切磋久矣安敢自暴自棄以速大戾於厥躬乎此所以至情迫切不以退居病處一已私憂而能已於言也所陳四事實愚臣二十餘年静居林下千慮之一得方今之務至切至要至重至大誠無出此伏惟陛下察納而决行之則聖學盡而大本立矣賢才用而大政舉矣近習踈而大病除矣禮樂修而大化行矣雍熈泰和之治端復見於今日矣非特愚臣之幸實天下萬世之大幸也臣干冐天威不勝惶懼戰慄之至為此具本併將近敕諭一道專遣親男賀士諮賫捧奏繳謹具奏聞成化戊子六月二十六日紀時事慈懿皇太后崩詔内閣議别葬不祔裕陵時大學士時等上䟽言大行慈懿皇太后今日祔葬與皇太后萬歳後祔葬自不相妨不宜生嫌别議以失大倫皇太后不允堅欲别葬上御文華殿集文武羣臣諭㫖羣臣無以應叩首而退時科道官列後聽聖諭不審及退刑科左給事中毛𢎞北面以手遮大學士時等曰面諍廷論此其時也何以退時等以從容答之比出文華門諸大臣多徑出有至左順門西者科道官尚集議文華門西以謂失此機會恐後終無挽回之理科道官禮部尚書夔等乃跪伏文華門外不出時大臣尚多觀望禮科給事中張賔大聲呼曰諸大臣平日居大位享大禄受國厚恩今朝廷有事乃不諍將何徃衆乃無敢不至俄而司禮太監懐恩等出夔等迎而哭曰大行慈懿皇太后不祔裕陵大不可者太監何不諍之恩曰我不避死公等當何如𢎞對曰吾輩豈敢避死今日幸朝廷不失倫雖死何憾不然致他日宗社不安雖舉族死亦何益耶恩曰恩等每進諫太后輙怒曰爾等逼我死萬一太后果欠安不幾䧟吾君於不孝乎𢎞曰諭親於道方可謂孝若阿從太后一時之意不以祔葬使太后得罪先帝則是䧟親不義安得為孝耶衆官皆哭恩等亦哭聲逹於内時殿門雖闔而上猶在御蓋以察羣臣退言何如耳恩等止哭諭羣臣少退俟再奏衆退各衙門章連上上自持章奏太后太后知羣情不從乃允之上御文華殿集羣臣諭以請命太后得允悉如羣臣議衆叩首呼萬歳聲動宫闕而退醫閭集巻八
