body:
  text: 醫閭集巻三明賀士諮編言行録先生曰人皆知神之神而不知不神之神且如此心藏往知來不可測度何神如之前乎開闢之初後乎萬世之後髙極於蒼穹之表深至於黄泉之下何所不貫此心之神如此惜乎今人皆錯用此心京都中行教化亦是難變先是貴戚勲臣家奢侈浮靡之甚須上躬行以化之又多建官學選有才徳者領其事凡貴戚勲臣及其子弟皆收入受教嚴師弟子之禮雖勲臣已有事管領者亦要朔望入學聽教行禮凡動作衣服宫室飲宴輿馬之類一一教之如式有率教而過人者或違教而不法者許其師月陳之以憑賞責若然則巨室既善而人皆善矣雷動風行誰復沮礙惜乎今之不然也人材之成決在於教如永嘉之人自幼皆能寫大字教使之然也若有一个臣斷斷兮無他技其心休休焉其如有容焉欽思此人絶不曽一見人於富貴之闗過不得者更說甚道理觀莊周非孔子處曰若三代時有敢如此說者便須誅滅又曰今之為官者甚是難為盖無處無内宦故也祖宗憲綱都布按與御史相為賔主今以謟驕二字壞之盡矣惜哉楊信民惟至誠愛民故民愛之如父母為官須識大體如廵撫便須除姦革弊激濁揚清但若寛慢姑息便不成體面矣論為政曰只有一箇虛已下問親賢樂道之心何事不能作何功不能成朱文公除官因其處有奄豎循習與監司為賔主遂力辭其官嗟乎今監司之於内豎則猶弟子之於嚴師矣朱文公之才徳寧宗在東宫時已思慕之及登帝位始雖召用不久即遣斥況乎素不相聞者能信任之乎此君臣相遇自古為難也劉七丈患其族大而常相争先生曰予有一法能弭之劉起而問之先生曰是當以徳化之也今誠能依文公四時祭禮一一行之祭畢而餕莫使異姓之親相雜序倫理篤恩義子孫之中有善之異於衆者奬之以為勸有過者責之以為戒今能如此行之不一二年間皆化而和睦矣劉起謝曰謹奉教因談韓信之事曰義利之間所争不多信不知大義所以後至叛逆族誅方其拒蒯通時其所處固是但其意以為漢王待之厚而不忍叛之却不知君臣之分既定盡職則為忠臣叛之則為賊臣矣君雖待我以薄甚至以刑戮加於身然我但當守人臣之義亦豈可叛之乎信不知此所以當君厚待之時則盡力報之貶降之時則怨望謀叛其心惟知利而已矣小司馬議論文章鄙陋之甚其述賛可刪曹操乃漢之賊臣後人當直呼名而已世之編詩者乃稱曰魏武帝何其繆耶見人有盡和古人之詩者曰弊精神縻嵗月一至於此可哀也已又曰縱作得好亦只假景虚情而已何足道耶與僚友相處須開心見誠方是道理周太王遷都之言孟子所載數句最好其曰不以所以養人者害人固是遷都正意其曰二三子何患乎無君此意尤好盖不漠然捨之而去也韓文公作琴操便只說得不以其所以養人者害人後面這意思便遺了荀彧為曹賊作謀一生至老乃自殺所謂死有餘辜者也當喪亂之世小有才而未聞大道者罔不殺身滅族人非遇明睿之主居大臣之位雖其才識過人得君寵任㫁大疑處大事然大臣憤怒謗毁交作主心狐疑而禍及矣故以小加大以疎間親鮮能全其功而保其身者人言唐太宗諌行言聽誠可事之君然今考其大倫之虧真所謂禽獸耳為之臣者於此不諌是舍大而言小舍重而言輕是可謂之忠乎茍於此諌之彼豈肯聽從之如他事乎然則謂唐太宗為真可事之君者恐亦未之思也問白沙先生讀秦誓自今觀之其論未免過髙先生曰然白沙後甞寄書來云向日都中相與言者皆當棄去不可更留之是先生後來之意也先生教學者曰汝輩須打起精神及時進學到四五十以後精神短少更不能前進矣教李子英曰不改過決不能進然過豈能自知故又須朋友相規戒子英對曰朋友多不肯言奈何先生曰汝無虛已下問改過實心彼如何肯說昔者顔子以能問於不能以多問於寡有若無實若虚所以進於聖人之域今要得長進決須學顔子方得汝輩平日彼此相視以為渠便比我争多少我何必問渠既存此意所以人不肯言所以不能長進先生謂子英曰汝所教之學生俱已讀小學乎對曰然曰小子須以是教之方有可望不然不過成就他一箇利禄之私而已責門生曰東萊格言文公教條欽特提掇出來教爾諸生盖以此是為學總括處由是可以希賢希聖今爾諸生乃不能遵信如何成得人王瑞之壁上掲掇錦二字先生以克己二字易之曰人能克已豈不可以希賢造聖耶問古人數世同居者其廟制當如何曰此亦不難處既立繼髙祖之宗所奉祀之廟於中却於其旁其後别立祠堂以為其餘繼祖禰小宗等奉祀使之各主其祀外則合為一垣四時之祭以次行禮如此方為得宜若只合祀於一處便只是茍且將就必不能得停當矣今之讀書者只是不信故一無所得事之無害義者從俗可也今人以此壞了多少事非聖賢誤人人自妄引以為口實耳却不道若害於義則不可從也朱子調息箴甚善如感興詩哀哉牛山木章結之以肅容正冠襟亦只是持敬之意朱子調息箴隨時隨處之言功夫全在此也主静先去了許多勞攘持敬之功方有入處聖人之道自是難盖以無時無處皆要合道至纎至微不可放過也若節義之士但只一長可取他事未必皆中節也吳草廬道統圖說恐非有道者氣象豈有十九嵗人便可以道統自任古之自任者莫如孟子然公孫丑疑其為聖人便深不敢當豈有不待他人稱已自以為盖有不可得而辭者乎况北方又有一許魯齋安可謂天下無人草廬謝僉幕等書甚非聖門氣象聖門開口便道敏於事而慎於言觀孔子顔子謙遜便可見也後世著書之人不為名者少子夏之言病少天地間本一大中至正之道惟太過不及遂流於惡如喪葬之禮自有中制若墨氏之薄與後世之侈皆流於惡者也故程子曰凢言善惡皆先善而後惡今之人天資美而壞之多矣若天資之偏由學問而有成者盖未見之也因論為學之道嘆曰人須是信方可望不信則心不相符決無所成孔門自顔曽而下諸子之言鮮有無病者有子閔子無病其餘一人是一人氣象規模人能着實信亦是難事如子路於孔子之言多是不信觀有是哉子之迂也之類可見使其能信夫子之言安有事衞輒之失哉好問則裕自用則小如子路輩亦是自用之意多遇如是之師如是之友而有如是之失惜哉道理不周徧精宻終是顧得一頭顧不得一頭故曰不矜細行終累大徳又曰人一時不敬則一時放肆悖理矣陸子静讀至其為人也孝弟章乃曰人既孝弟如何更說犯上此雖是他天資髙處便有簡畧細微之病如人亦有事親長能孝弟者然些小犯上之事時或有之故為學之功不可不細宻周詳也人之膽大敢為若不知道則弑父與君何所不至故曰膽欲大而心欲小不可有偏今之為官者多是不用人言孤立於上上下不交事安得濟後生須下問以納善然後可望草廬看來只是聰明博學躬行切實意思少故其出處著述皆有可議自來說草廬者便不見有躬行實得意思稱許魯齋便有躬行實踐意思今其文字亦可見為己之學自是休歇不得今讀書開口便是此理只是汝輩無此志故一無所得如小學中所載更不消說如大學開口便說明明徳論語開口便說學而時習之朱子釋之便要明善復初中庸開口便說性道教由教而入者便要戒懼謹獨孟子開頭便曰王何必曰利亦有仁義而已所謂仁義便即是明徳即是善與初即是性道皆是一般說話只是而今惟在舉業上走把這一路都一筆勾了所以只如不讀者一般全然不覺他是說箇甚麽大抵有志者事竟成志既不在此如何有所見有所得人惟知利而不知義所以量狹小若知得義之分惟以義為主則量不期大而自大矣教門生曰予自來讀書於舉業上便不似爾輩汲汲當時心中便以為聖賢之書決然不是只教人科舉決然都是行得者聖賢定不㑹欺人聖賢處下的方子人肯將去醫病無不效者惑世誣民者甚多故學者不可不先窮理能窮理便不為其所誣矣命諸生歌諸生為學事科名之詩有一年長者亦嘻笑責之曰樂然後笑不知汝有何樂汝輩迷了正路胡行吾方髙聲疾呼喚不囬頭却反嘻笑此何理也事師在乎嚴憚安可如此耶因諸生於朋友間全不知責善之道因命作朋友之論來看已而各作論來請教先生讀之曰既知得朋友之倫是如此却都㑹這等說話乃全不依這言行便不是人了便如鸚鵡猩猩說人的話做不得人底事一般更成箇甚麽人教門人云無恒是箇大病汝却有此病所以不得長進今要躬行須先以敬為主不敬便不是聖門家風今後放曠之言放曠之事便須收拾起方可望進經書中說自古賢聖未嘗不以敬為首稱昔程夫子專以敬為學當時蘇東坡只要打破程夫子敬字至今觀之程夫子便是賢聖之學東坡不免於小人而無忌憚也學者須與朋友講論然後知見可髙明不然便孤陋寡聞以為好者却反是不好而不自知矣昔蔡伯喈得王充論衡秘不示人自今觀之論衡中胡說者不少可見伯喈秘得沒來頭當時若與人共觀豈無有知其繆者乎禮記有可疑者葢當時記禮之人非是深於道者是以多差誤有聖賢之言當記而誤遺之者有不得聖賢之意而妄為増添者有他人之言適其意而取之者有相傳之繆誤不決擇而遂書之者故他經皆精純而惟此有雜禹聞善言則拜葢聖人之心純是天理故一聞善言便自不知不覺喜歡而拜謝之今人之心全是私意無為善之志雖聞人之善言如何肯拜耶鄉人有兄弟争屋者先生謂其弟曰夷齊兄弟讓國今却為兩間房傷兄弟之情國與房孰重乎彼為人而吾獨非人乎汝惟知利而不知義耳其人愧謝而去異日見兄來先生取小學夷齊讓國虞芮讓田二章以示之彼曰吾弟欲傷我先生復取孟子象欲殺舜章示之其人曰此聖人事也吾焉能之曰學聖人乎學小人乎其人雖以為然而未有痛切意及歸而思之乃謂人曰賀公之教誠天理也非其言吾何以知之吾與弟争屋而經書中有兄弟讓國者吾怪吾弟傷我經書中有弟欲殺兄而兄反親愛之者吾然後知聖人教人之意詳備如此也吾異日當謝教焉先生聞之謂子姪曰人性本善但為氣稟習俗所壞耳義理之言自少至老絶不曽聞彼何由而入於善乎以此又見天下無不可改過之人也讀白雲許公集曰志聖賢之道甘處貧賤可謂賢矣但身心所得者淺是以不免於文士浮華之習佛老異端之惑淫媟鄙猥之辭也觀其文可見又曰許公之所以如此者便無惡不仁之意故也所以聖人說好仁者說惡不仁者盖不惡不仁則其好仁之心亦不切矣今欲養賢才以輔治理須先考察知務實行十三四員提學之官使提督各處學校到任先考學官有不堪者罷送吏部聽選别職即選本學生員及山林隱逸或有司見任之官徳行學問可為師法堪授學職者推舉之使教生員本學推舉者不妨其科舉原自有司推舉者仍令食原職俸禄一以躬行為已不事虛浮無益之文嵗貢依程子所論之法不可但挨年嵗如此數年之間俗弊可革而賢才漸多矣先生聞閣下某人劾退歎曰國家用人不能慎之於始致使小人蠧政二十餘年今雖劾罷於朝廷之事已無及矣茍不求所以用人之道雖罷黜一某人不知後來如某人者又有多少盖朝廷用入閣者皆出翰林翰林之選文字而已非嘗考其行也又翰林之職只在修書作文茍非大無顧籍貪汚請託之甚者外官何自而議之故不才者得冒濫大用況翰林之擢惟在進士首數名耳二甲以後雖有大徳大才者何由得入閣而大用乎此擢任之所以每不得人而誤天下也内外文武少不出於宦官宫妾之門安望天下之治耶一門生失愛於繼母有怨之之意先生責之曰觀汝所言心中全無天理矣古人處繼母而盡孝者多矣見於小學經書中者汝可一一尋看汝之孝果能如古人而親有不順者乎汝之心乃大不孝非細故也我教汝兩句切要之言可大書於壁時時玩味而自省庶乎有警於心耳西山先生曰罪已而不非其親者仁人孝子之心也怨親而不反諸已者亂臣賊子之志也道二仁與不仁而已矣出乎此則入乎彼汝今既有怨親之心便是亂臣賊子之徒矣可不懼哉為政須變移風俗且如杭州陋俗富家大族皆令婦女盛粧坐肆與人交易送喪出城同類設席邀喪主既醉方㑹葬此等風俗不終朝可革今國朝百數十年來乃無有變之者是可嘆也教坊司所作淫邪鄙倍之樂壞人心術者也夫古樂久亡今欲考定律吕中和之聲固是難事然此等邪穢亦不可以革之乎京師為天下觀法首善之地也今却放三箇院子亂人紀壞風俗欲天下化而入善可乎此弊之來雖逺然上欲革之吹嘘之耳何難之有因論為上司者曰下民無大無小皆呼為父母者何也以在上能安養之如父母之於子也乃或畧無慈愛惻怛之心而惟以嚴刑峻法為事豈父母之道哉夫虎狼毒矣不食其子為民父母反虎狼之不如矣父母二字可不深思之哉朝廷取王宗貫敇諭方說得痛切方有箇着實用賢之意王公素稱正直不知此來如何處置須陳言將司禮監批聖㫖權柄歸還閣下如祖宗初制使政不出於宦官方是第一等大事然後禍本可絶天下可平但未知王公果何如耳偶見南京壽俊㑹乃王宗貫守備時與成國公衆人所作命名作序乃尹氏直也曰十數人中有好者有不知者如某人貪濫小人王公乃與之作㑹便是惡惡之意不十分了若不知其人却是糊突又曰耆英㑹名頭本不十分今又做壽俊㑹豈不貽笑天下後人夫在已果英人稱之可也自曰英可乎今某人為人如此乃自稱為俊不幾於無忌憚乎又曰白樂天九老㑹其名方是耆英之名是文潞公粗處若使臯陶稷契周程張朱肯如此名乎當時雖司馬公亦預列然其初自謂年幼不敢班於是列文潞公乃命人於幕後圖其像而强之㑹然則司馬之謙退安知其不在於此乎又曰某人壽俊㑹言其在㑹中年少意欲比司馬公你如何比得他簡選武將須是先知些忠君孝親道理更曉解兵法方可大用天與之良貴却棄而不求狥在外之得失乃死生以之可哀也已先生嘗謂重門擊柝自古然也今朝廷知重三邊之防而腹裏不盡建城郭各邊惟謹墩墻之備而住種不盡築堡圏承平之時因循不覺一遇盜賊蜂起何以自保先生之考二府君生於浙之定海年弱冠其叔考志初來遼補役叔考有弟當行臨行避匿府君慨然曰塞垣非可獨往我當共之始至廣寧後遷義州奉事叔考極孝養叔嘗疾踰旬朔府君晝耕於郊夜侍於家雖極辛苦不自知也嘗商於南州有所獲縱兄弟先持以歸謂為已賄已而空囊抵家尊者詰責之不與之辨也又嘗賖貿木棉於丁家道口貲貨既出而天氣亢旱府君不忍人之艱於食也遂棄劵而歸客中無事手織草履置之門外見有跣足過者輒與之一日邸中樹杪有蠟嘴鳥為巢同伴少年以計取其一其一飛鳴不已府君憫之勸同伴曰安用此子不見其配之哀鳴乎縱之可也乃譬曉百端同伴猶不可府君因具酒肴請之縱焉雌雄和鳴飛翔上下府君喜謂同伴曰斯不可樂耶途值脩橋者輒捐貲助之至一處適囊底空竭惟網巾上有金環一雙遂解以畀之府君仁孝忠誠皆此類也先生母郭氏夫人勤慎仁慈先夫人張氏卒時有女數嵗夫人養如已出既嫁之後恩意尤篤先生之夫人于歸十餘年尚不覺其為先姑女也繼母之賢世亦鮮焉用是郭先生及胡節婦咸有異行云醫閭集巻三
