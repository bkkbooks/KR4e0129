body:
  text: 醫閭集卷二明賀士咨編言行録都督李公始至求寫影紙習字畫先生因作一簡勸之以為字畫小藝不必縈心惟讀古聖賢書可以養德性發神智施於處事接物無所差謬忠君報國事業日益光明俊偉可與古賢齊趨公何不務此乃瑣瑣於彼耶李公大喜即令素日讀書之官輪流日講以求進益且請何書為要先生乃令講大學衍義仍令其官先授於先生然後講之嵗以為常李公德業大進王參戎禱雨寺中見芍藥盛開命麾下作對句送先生髙下先生曰今當竭誠悔罪之時思政事之闕失而改圖之可也此等戲事恐非其時吾邉舊有六馬營堡監軍鹽山王公翺所建捍外衛內邉境以安後邊警數動暫撤兵回城因而廢弛邊患日甚先生詢得其利害移書撫憲河東張公九雲乃修復清河堡又數年韓參將來分守韓嘗從先生逰尊事愈謹先生告以復餘五堡自是邊患益衰鄉人有失其前母之墓以其母配父葬前母之子來自原籍求其母墓不得博訪故老有告之曰汝母棺嘗被火葬之某地但其封不識矣其子求得焉於是怨其弟欲負母骸歸原籍先生聞之曰噫皆非理矣皆知有母而不知父矣因簡示之其人遂服從合葬父壙陸湛為僧一旦慕儒道學於先生門人范以德遂反正復從逰館下其家故習老氏業奉先之禮未能正也先生詩以風之曰去釋從儒世所稀綱常得處便歸依如何春夏秋冬祀尚與朱家禮制違湛慚而改門生有慢師者先生曰讀書以躬行為本躬行以孝弟為先然必得師長之教然後知孝弟而為之故小學之教必曰隆師親友隆之云者嚴憚恭敬與君父等也今汝於師長之禮怠忽如此則家庭之間事親事兄之道從可知矣此一坎不能過更學何事又曰為弟子者須於先生之言著意聽之無疑即行之有疑則質之今汝於余之言如水澆石此德業所以不進也德業不進而徒講於之乎也者之間有何益於身心也又曰埋須講究如祭禮便須知行則為厚德不行則為薄德此正格物之事也又曰今人於他人有過甚能議論及已身之過與人相同處便置而不問矣先生每教人收斂精神潛心為已嘗有言某先生公餘則著書夏則脫去巾帽先生曰不敬甚矣自古曾有囚首聖賢耶或有以吳文正所著學統學基等文為問先生曰聖賢氣象不如是也觀論語可見先生常言懷柔侯施聚善守邉其於邉牆止如人家院牆不欲甚髙厚然修之有法每臺有牆板稍有披缺瞭至日髙以後無警即一人瞭餘人隨壞隨修嵗以為常故邉無大壞極敝之時擾民妨農之舉又安有千里調夫之害飢疫死亡之憂耶公嘗曰邉牆非以其阻賊不來取其知出入耳操軍殺將在吾為將者真老成之謀也後來不知邉事者往往築牆高厚既勞人力其有損闕非臺軍所能修補聽其大壞然後動大衆築之戎馬猖獗軍民荼苦較之昔日大有不侔然後知老將識慮之逺非後進淺謀所可及也問魏公之量固是間氣恐亦有所偏如軍中斬一卒毁其所管者只如尋常竊謂當怒之事還是怒方是如舜之誅四凶亦未嘗不怒也今魏公於此乃全不怒不知如何先生曰亦不是不怒但怒得不覺不似今人驚怪耳七去三不去大綱是如此變通還在人如前貧賤後富貴不去者若無子多言之類可也淫者可不去耶以是推之自然可見其餘讀文中子至辭人不願出仕處曰此是實事説得自是好與他處不同韓文公上宰相書亦甚陋矣謝疊山却還稱他善占地步已是放倒旗槍者更説占地步耶為學須立志若不立志決無有成之理譬如射箭須先志於正鵠然後可以中若或大或小則在力也今不立志髙逺正猶射者不志於正鵠胡射亂射却如何得中也白鹿洞教條與夙興夜寐針當時時在念者看元城語録曰不免異端術數之雜孔子於弟子只稱名至程門便有秀才賢輩諸君等稱呼矣今為將者由其不學少知義理率皆率意奢縱若要好須得一儒官傅導之嚴考其輔相之善惡實迹而黜陟之庶為將者不得肆意妄行矣六書本義之書雖非大義理所關然其發揮字畫本義誠為有理非其他以已意著述者比問靜極而動者聖人之復豈常人之心無有動靜乎曰常人雖當靜時亦不能靜故曰靜極而動者聖人之復此理無處不有無時不然人惟無私意間隔之則流行矣先生看朱子語類因命士咨曰可取明白切要者點出倣近思録卷類抄為一書與學生及鄉之讀書誦佛經耆老輩觀之以祛愚俗之惑可得進道之門户也今世無人材皆學校壞之耳在位者宜有以處之也今之教官絶少稱職者若提學者得其人考察而罷黜之或别項差遣務選有德行者為之庶幾人材有望教門生曰為學先要正趨向趨向正然後可以言學不然終不免於小人之歸也今人見有人言欲學聖賢則譏誚之不成為學只是學小人學愚人耶汝輩且安心讀小學必以聖賢為志知即行之便是君子之徒至於理既明矣然後應舉中與不中則有命焉若趨向專志於得即是小人矣目前由科舉登顯官而以貪汚不忠自取敗壞者往往有之皆趨向不正志於得耳何足效乎黃氏東發質實少智之人言多糊塗古之政事學問一貫事耳今人學自學政自政判而為二故所學徒誦説而已未嘗施之政事政事則私意小智而已未嘗本之學問也故今之為政者剛者偏於剛柔者偏於柔間有得其一二者亦不過天資之偶合非學問之功也故欲政事之盡善須本之學問白沙答張廷祥詩所謂吾能握其機何必窺塵編等語不免有過髙之意白沙讀秦誓抑揚之間亦有太過之意先生嘗曰白沙後有書來謂其前時講學之言可盡焚之意有不滿者在為人上者既是不貪亦須嚴切以禁屬官之貪方有實惠以及其人若不能禁之安能濟事讀書須著實體察如讀孝弟章便反諸已曰吾能孝弟否乎犯上作亂吾有此失否乎善無於已即勇為之惡有於已即速改之只謹守此便是讀書之法劉向云仲舒管晏弗及伊吕不加向子歆以此為過向之言固有失歆之言亦未為全得夫仲舒於伊吕固所不及若其正誼明道而不計功謀利管晏何曾夢見他腳板耶聖人之法細密而不粗率如人賢否一見之便不言我已知其為人必須仔細試驗考察之今人觀人一見便謂已得其實真俗人所謂假老郎者也小人懷土如居不仁之里不肯移向仁里中去又如居亂邦貪富貴而不去便是懷土不是譬喻也問尹氏為母日誦佛經一卷朱子録而識之何如先生曰尹氏篤厚之人不違母之遺言故朱子取之然亦尹氏之所以為尹氏耳使程子之母信佛必能諭之於道矣如其不從亦若尹氏之母亦别有處置不但如是先生讀白沙先生手書為學之方嘆曰先生之資質髙功夫深真豪傑之士不為流俗之所移者又曰先生潛軒賦言為學之道在乎主靜以為應事建功之本學者宜深味之先生嘗曰吾聞之君子讀書須求大指義不必纏繞於瑣碎傳注之間也學者凡事不可尤人皆當安之於命耳義理精微尚欲講究況眼前之事有何難見但為私意所蔽於是有不能見而唯以尤人也觀薛文清讀書録謂其中所言克已之事甚善韓信軍中問李左車便是聰明過人處今人不用人言者皆是此心之不明耳驕惰之心一生即自壞矣黃東發謂臯陶以司刑而子孫無聞不得與禹稷契比韓信以司兵而宗族夷滅不得與蕭曹張良比真淺陋謬言也臯陶得道統之正傳者尚謂其以司刑禍其子孫不知何等人可司刑而福其後也韓信以謀反誅乃以之比臯陶何其謬耶至其蕭曹張三子之後為異端之徒篡弒之賊皆為其祖宗之榮又何卑耶有一世之俗有一方之俗有一州一邑之俗有一鄉之俗有一家之俗為士者欲移易之固當自一家始偶觀李性文評曰朱子之文詳於程子者發明道理以示人耳今乃以程朱之文詳略不同為天分之異誤矣又曰以程門之文未免訓詁家風對蘇門之文未脫縱橫氣習而言是不知輕重者也英廟復位之詔人謂嶽先生所作所謂多難興邦髙帝脫平城而肇漢隱憂啓聖文王出羑里以興周此在臣下表稱可也人主自謂可如是矜伐耶嘗論天下之士曰豫在京中獨見一白沙耳用人猶醫之用藥和緩者宜於久逺而短於應急快利者速於去疾亦能損傷真氣惟用之得宜則可全其利而免其害也先生教人必自小學始時科舉之學行往往舍而不讀常命諸生曰不願讀小學者無留館下於是小學之教盛行鄉邑焉先生每言後世之人知改過遷善即可與之有為嘗欲取古人改過誠身者録為一帙以化鄉閭然以急於自修竟未果也先生嘗言遼東當祠者馬都督雲葉都督旺此二人奉髙皇帝之命航海來遼招撫夷夏安輯兵民開創衛所建立學校濯變風俗使蔚然為衣冠禮義報功報德何可忘也於是鄉之耆老請於上司具奏朝廷竟不果建都督胡忠分守是州睹馬公玄孫輩嘆其先世功德欲為建家廟先生聞之使告曰馬公之祠與其建於家孰若因民情而建於吾州乎胡公曰吾不及也遂建祠城南隙地廟額祭品尚俟國典云張汝弼傳某達官之論以為前代取士以辭賦故有道學之説今時取士則純用經義矣更説甚道學先生應之曰是先正所謂為己耶為人耶躬行耶誦説耶精切耶鹵莽耶以是辨之則謂務經義而即為道學者其亦誤矣先生每念謹封疆之界謂羌氐不宜置之近牆日使窺伺我邉況又有容之牆內者逺近虛實多少強弱一切為其所得往時賊不近牆欲來犯我邉必用姦細先來覘視今自封疆不謹之後則人人皆姦細矣因此一旦起營去後兵禍之慘不可勝言此事亦既有明效而邉人仍踵故轍者茍徇目前不恤後患耳況賊之老小在此州却往鄰州虜掠人雖知之亦泯泯而已此何理也又此賊既在牆內何所不至搶剝衣服淫汚婦女一切匿之蓋上所諱言人自緘口矣又地方既有此等於防邉自爾怠忽既憶其貪我食且不盜邉又以為縱有别賊殺此可以免罪又得升職邉防大壞全在此耳古人云明其為賊敵乃可服昔年法度彰明之時彼去邉最逺臺軍瞭見便舉煙放炮而官軍嚴以備之或伺其夜宿則令步軍劫之緣此輩近邉更無他事只作賊耳今却容其住牆內外何以關防也戊申敕諭有云舊例不許爾等近邉今朝廷憐爾窮困暫令近邉藏躲精壯人等仍須在三四百里外住劄防護何嘗許其經年纍嵗在牆下牆內略無中外之辨乎教門生曰讀格物致知便須一一窮究道理讀誠意便須著實好善惡惡如此方有益耳觀通書誠下章三注中引朱子所論未發之中曰此説不是當是未定之説引之於此者纂修踈謬耳後考大全集中此乃與張敬夫書文公注云此書非是存之以見議論本末耳因言修官書者之不用心可慨也中庸或問必有事焉一段當涵泳又曰今之學者類多放曠不敬此是一大病乃聖門之所痛絶者故曰古之聖賢兢兢業業過了一生若書之言堯便首之以欽明文思舜便曰溫恭允塞詩之稱成湯聖敬日躋文王敬止之類皆是道也學者欲學聖賢必戒謹恐懼去夫放曠之病庶可入也先生曰某上不能有益於朝廷下不能有益於鄉黨今爾諸生相從若復拒之不忍為也且爾諸生之相從者以余為年稍長識頗明故耳然須有相信之意則好若不相信無益也古聖作經之意欲使人皆明此理而措之躬行非徒使人記誦之以應科目釣聲名取富貴以榮身也今爾諸生須知此義莫負古聖著書立言之意可也若曰吾輩之所希者舉業而已則甚非余今日相望之意且師生之間即朋友之意若余之所為有可疑者爾輩當面請之若然則非惟有益於先生必有益於弟子故曰事師毋犯毋隱因論處朋友之道曰吾觀爾諸生於朋友之過失不敢明言恐其怪已此甚非友道欽自來不怕朋友之怪有失者未嘗不直言以正之不從然後止感諸生之相從不得不明言以告勉之勉之又曰為政須養人亷恥於下官不可輒加呵叱箠楚雖下至吏卒亦當以亷恥養之彼然後知自重而勤於公務也又曰今之文職六部等衙門亦有所屬然不專用箠撻者以人知恥也武職獨非人乎顧上之人不以亷恥養之耳茍能行之風俗之變亦不難也又曰在科中每見同僚於吏員有小過輒罵詈箠楚待之若犬彘心甚不平謂同僚曰彼亦人也若不以人理待之則彼自視益輕而愈無恥也又曰朝廷髙爵厚祿為何只為幾個窮百姓而已茍不與之為主而聽人虐害之乃曰我亷矣我勤於公事矣如此可以為忠臣而不負朝廷之恩乎巡撫之職與巡按不同蓋必撫安一方之人使之安生且得便宜處置嘗有人一履任輒參奏許多官亦未為便必須先周歷各方訪其行實出令以警省之使之悛悔不遵令然後舉其惡之尤者奏而罰之則各官自知懼不敢貪汚暴虐矣今一下車即參許多官則所參者未必惡之首而惡之首者未嘗參也又曰法須簡約人方能遵守行之久逺文具而已者豈能行之久逺哉今人於宴會若製為歌詩辭語明白不必文飾令左右人歌之或父子骨肉間則説孝慈或同僚之間則説彼此勸勉莫忘公務或言飲不可過多或言醉後威儀言語當謹慎或以古之清亷者為勸或以貪汚者為戒使人於晏樂之時不忘警懼之意則亦大有益也先生曰今人見人有勉強犯捉者便笑曰某人造作不誠實我嘗曰且得肯如此亦好了如本好色把持不好色如本好酒把持不飲酒此正矯揉之功如何不好若任情胡行只管好色飲酒乃曰吾性如此此等之人以為誠實不造作可乎孔子答人之言各中人之病説得如此好雖然又不似快説話者若孟子則便似快説話者人之欲無大小但為其所中則牽制而不能舉矣人之當官始之清亷者及其卒多為利吏二者所誘蓋不可不慎也又曰官之於吏當以德化之須朝夕勸諭之曰吾與汝當為好人不可壞法以貪汚若貪賄賂虐害小民與賊盜何異今我輩見賊盜必深疾惡之豈可自為賊盜而不顧也天豈不降災禍於其家者乎如此朝夕省諭彼亦可以省悟感化不為惡也問神者妙用也用即費而顯也非神也妙用則神也蓋言所以為用者也如雷動風撓火燥用也所以動撓燥者神也先生曰然問體用一原顯微無間異端不如此故有絶人事而求天理者曰世教不明故言天理者不知用之人事言人事者不知本乎天理所以一則流於粗淺一則入於髙虛又曰理之名雖不同實則為一聖賢認得定故橫説直説都是譬諸稱呼人或名或字或官或號皆是自不知者視之稱名則知某人稱字稱號則不知矣是則雖知其人之名其實未嘗知也國朝吳康齋先生不知其詳白沙稱其未嘗著書意以今之著書者於理無所發明不過為名而已問格物致知之説程子己論之詳矣其門人之言乃鮮有無病者何也先生曰程子非一時之言門人有聞者有未聞者且各人資稟不同又有相從不久便做官去者若資稟髙相從久篤實行之方見得親切若但一時聽先生之教未能盡行雖知以為好語然其中十分切要者也只作尋常好看了意略不同則其終也逺矣學校乃朝廷作養人材之所禮義相先之地如不孝弟不忠信無亷恥者養之何用上司於如此等人當訪而黜之然後人知務本不然則此等人雖能文章終何用乎子弟之幼者今人唯教以讀書作句於灑掃應對冬溫夏凊之禮反略不加意皆由世教不明故耳此人材所以難得也王繡衣過義州令儒生行家禮欲通行二十五衛詢於先生先生為之少加損益曰禮須讀而習之如孔子尚與弟子習禮於樹下習之熟則行之自易矣官府文書止可舉其大綱使行之者由綱以考目可也觀小學之書曰必如此然後有益於身心為聖賢之學也他道非無一長可取但所得者少而所失者多唯身心之學推以治人極於贊化育參天地人有求為私屬者先生以正理喻之退謂家人曰渠來以私意求我我却以正道勸之渠欲拖人下水我却救渠上岸不亦可乎白沙之詩正如朱子之文自有許多意味觀陳翰林張御史和唐音詩曰唐詩本不十分好被和者比之又覺得他還好古之天子公卿躬行於上言行政事皆可師法人焉得不善世焉得不治後世教化既無風俗不美人焉能得善世焉能得治乎大抵人之情從俗易違俗難若風俗茍善中人以下之資皆薰陶漸染為善矣若風俗不善須豪傑之士挺然特立與俗違拗方能去惡從善力量稍次者已不勝衆人排斥矣況其下者乎後世為善之難如此此賢才所以不易得而世所以不常治也于少保所為有取死之理但當日殺之非其罪夫英廟被留北廷郕王監國少保輔相之自當卧薪嘗膽期復不共戴天之讐以歸英廟乃不久而郕王遂居天子之位無復討賊之心且廢太子而立己子及敵人自送英廟歸景泰但相與一見而遂幽之南內此皆少保當國時事也豈不有死之理然謂其迎立外藩以樹私恩則實無是事也又曰于公大才有安社稷功人鮮及之但大義不明遂至於此或曰郕王欲踐位少保何以處之曰當時英廟被留人心搖杌雖郕王監國亦自恐懼不暇便豈敢有他意當是時少保處之有道使郕王大誥天下以監國復讐大義敢有上言欲王即真者即是姦黨身家重罪如此則後來郕王雖有邪心何由能動當時既無處置後來自難既不能死諫又不引去而主張國事權勢自如乃使英廟禁錮南內此心何忍耶又曰于公清白抄沒時其家實無所有人之大節猶四支四支全而有病者猶可調理一支缺焉可謂人乎荆楚之忠臣能助主以闢土地者皆周天王之大賊也是皆助其父而凌其祖者也故君子先務知大義而後盡細微先生嘗曰某平生於理當為者即為之最不會隨順人情所以多致人怪者在此然人之處世決無使人都道是的道理若使人都説是便是鄉人皆好之而有茍合之行矣欽前日上言苦口極言者此心自不能已也蓋當日不能盡言職時當退也安得不退於家今朝廷用賢納諫正大有作為之機會也雖居憂養病亦不得不一言也不然何以答朝廷取用之意耶問靜無資於動動有資於靜凡理皆如此如草木土石是靜物便皆自足不資於動物如鳥獸之類便須食草棲木矣故凡靜者多自給而動者多求取故人之寡欲者多本於安靜而躁動營營者必多貪求也先生曰亦是如此問視聽思慮動作皆天也人但於其中要識得真與妄耳如目有視之理耳有聽之理目不可以聽耳不可以視這豈不是天也然人之用目視物用耳聽聲則有真有妄故視明聽聰真也視不當視聽不當聽者便妄也譬如火有焚灼之理刀有裁割之理自是物理本來如此就人言之用火用刀得其宜便是真若將火去焚燒人屋舍將刀去胡斫人便是妄矣先生曰然醫閭集卷二
